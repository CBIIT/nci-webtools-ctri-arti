    <!--
      CHAT.HTML - AI Chat Interface
      ==============================
      Buildless SolidJS chat with AWS Bedrock & Google Gemini.
      Features: branching conversations, IndexedDB storage, file uploads, tool use.

      DEVELOP: Open chat.html in browser. No build. Dependencies via CDN import maps.
      TEST: Open ?test=1 in browser, or run headless with coverage:
            npm install playwright && node -e "const{chromium}=require('playwright');(async()=>{const b=await chromium.launch(),p=await b.newPage({ignoreHTTPSErrors:true});await p.coverage.startJSCoverage({reportAnonymousScripts:true});p.on('console',m=>console.log(m.text()));p.on('pageerror',e=>console.error('PAGE ERROR:',e.message));await p.goto('file://'+process.cwd()+'/chat.html?test=1');await p.waitForFunction(()=>window.TESTS_DONE,{timeout:30000});const c=await p.coverage.stopJSCoverage(),e=c.find(x=>x.url.includes('chat.html'));if(e){const s=e.source.split('\\n'),n=s.length,o=[0];for(let i=0;i<n;i++)o.push(o[i]+s[i].length+1);const u=new Set();for(const f of e.functions)for(const r of f.ranges)if(!r.count)for(let i=0;i<n;i++)if(r.startOffset<o[i+1]&&r.endOffset>o[i])u.add(i);console.log('Lines: '+(n-u.size)+'/'+n+' ('+(100*(n-u.size)/n).toFixed(1)+'%)');const uf=e.functions.filter(f=>f.functionName&&f.ranges.every(r=>!r.count));if(uf.length)console.log('Uncovered:\\n'+uf.map(f=>'  '+f.functionName).join('\\n'))}await b.close()})()"
      SOLIDJS: COMPONENTS RUN ONCE
      ----------------------------
      No re-renders. Reactivity = 0-arg functions, auto-wrapped and re-executed on change.
        ${() => val}  → reactive     ${val}  → static (evaluated once)

      Signals:  ${count}              ✓ (signals are 0-arg functions)
                ${count()}            ✗ (called immediately, static)
      Stores:   ${() => store.prop}   ✓ (wrap store access)
      Props:    ${() => props.title}  ✓ (props have getters, but templates need () => for tracking)
                Never destructure - loses the getter
      Handlers: onClick=${e => fn()}  ✓ always use param (avoids 0-arg auto-wrap issues)

      STORE ARRAYS: TRACKING GOTCHA
      Accessing store.array tracks the PROPERTY, not mutations.
      Accessing store.array.length tracks LENGTH changes.
      Accessing store.array[i] tracks INDEX changes.
        for (let i = arr.length - 1; i >= 0; i--) arr[i]  ✓ tracks length + indices
        for (const x of arr.slice()) ...                 ✗ slice() breaks tracking
        <${For} each=${() => arr}>                       ✓ For tracks internally

      SYNTAX
      ------
      <${Comp} prop=${val} />            Self-closing
      <${Comp}>children<//>              With children
      <${Show} when=${cond}>...<//>      Conditional
      <${For} each=${items}>${x=>...}<//>  Loop
      class=${() => `a ${b() ? 'c' : ''}`}
      classList=${() => ({ active: isActiveSignal(), disabled: store.x })}
      style=${() => ({ width: w() + 'px' })}
    -->

          toolSpec: {

            description,
            inputSchema: {
              json: {
                type: "object",
                properties,
                ...(required.length ? { required } : {}),

      async function initDB() {
        return openDB("chat", 3, {
          // Version 3: added path index on resources
          upgrade(db, oldVersion, newVersion, transaction) {
            const createIndex = (stores, name, key = name, options) =>
              stores.indexNames.contains(name) || stores.createIndex(name, key, options);
            const stores = {};
            for (const name of ["agents", "threads", "messages", "resources"]) {
              stores[name] = db.objectStoreNames.contains(name)
                ? transaction.objectStore(name)
                : db.createObjectStore(name, { keyPath: "id", autoIncrement: true });
              createIndex(stores[name], "id", "id", { unique: true });
            }
            createIndex(stores.messages, "agentId");
            createIndex(stores.messages, "threadId");
            createIndex(stores.messages, "parentId");
            createIndex(stores.threads, "agentId");
            // New indexes for subagent thread support
            createIndex(stores.threads, "parentToolUseId");
            createIndex(stores.threads, "type");
            createIndex(stores.resources, "agentId");
            createIndex(stores.resources, "threadId");
            createIndex(stores.resources, "messageId");
            createIndex(stores.resources, "path");
          },
        });
      }

      function getChatSystemPrompt() {
        return `You are terse and direct. No emojis. No capability lists. No performative helpfulness ("Happy to help!", "Great question!").

Don't announce what you'll do—do it. Don't self-describe—embody. Match the user's energy and register. Humor is fine. Engage with absurdity. Be a person, not a task router.

Never make things up. Use only information from your sources. When uncertain, say so plainly. Prefer direct quotes over paraphrase when the source matters.

When writing: surgical economy. Specific nouns, active verbs, no unearned adjectives. Trust your reader to complete the circuit. The right word sounds inevitable; its cousin sounds written.

${TOOL_DOCUMENTATION}

## Code Environment
Code runs in a browser sandbox. No Node.js, no build tools.

Patterns:
- CDN imports: import { x } from 'https://cdn.jsdelivr.net/npm/pkg@version/+esm'
- Top-level await supported
- fetch() works (proxied for CORS)
- resources.create/view/list/delete/rename/replace for files

Secrets: Store at path, read as plain text (keeps values out of visible code):
  // Save once with editor: create /secrets/openai with value sk-xxx
  // Read in code:
  const apiKey = (await resources.view('secrets/openai')).content;

## Skills
Reusable expertise stored in /skills/. List with: editor view /skills/
When relevant, read full instructions: editor view /skills/{name}.md

Create skills to capture workflows:
---
name: skill-name
description: When to use this skill
---
[Instructions]

## Memory Protocol
1. At conversation START, list /memories/ for prior context: editor view /memories/
2. Save important progress, decisions, context to /memories/ files
3. Keep memory files organized. Delete irrelevant ones.
4. ASSUME INTERRUPTION: Save progress you don't want to lose.

HTML files created with the editor tool are automatically rendered in the preview - no need to run them with the code tool.

## Sub-agents
Use the task tool to delegate work:
- code: Code agent - writes and runs code directly in the sandbox to build, inspect, transform, or automate
- research: Research agent - gathers exact evidence, saves raw findings, and explores broadly
- plan: Plan agent - designs implementation, reads /explore/ findings, and turns evidence into execution steps

When to use:
- code: When the fastest path is to solve the problem in executable code
- research: When you need to investigate, research, or gather evidence
- plan: When you need to design an approach before implementing
- Chain them: research first for context, then plan or code based on findings

After sub-agent completes, review its saved files before proceeding.

## MCP Servers
Use mcp tool to interact with configured servers for external capabilities.`;
      }

      function getCodeSystemPrompt() {
        return `You are a code agent. Solve problems by writing and running code directly in the browser sandbox.

Write the code. Run the code. Inspect the result. Iterate until it works.

Match the user's ambition. Think broadly about what code can do here:
- build full apps in plain browser modules
- explore APIs with fetch()
- call MCP servers from code when useful
- use CDN imports for SDKs and libraries
- write one-off programs to parse, extract, transform, migrate, scrape, analyze, or deploy
- produce polished UI when the task is frontend work

Don't become narrow or mechanical. If code is the best tool, use it creatively and completely.

When writing: surgical economy. Specific nouns, active verbs, no unearned adjectives. Trust your reader to complete the circuit. The right word sounds inevitable; its cousin sounds written.

${TOOL_DOCUMENTATION}

## Code Environment
Code runs in a browser sandbox. No Node.js, no build tools.

Patterns:
- CDN imports: import { x } from 'https://cdn.jsdelivr.net/npm/pkg@version/+esm'

## Buildless App Style
Prefer the same style this app uses:

- self-testing in the browser when practical
- minimal moving parts

## Solid HTML Rules
- Components run once.
- Zero-arg functions are the reactive shape.
- Signals are already getters.
- Store fields, props, and computed expressions should be wrapped as \${() => ...} in templates.
- Never destructure props.
- Use setStore(...) or produce(...), not direct mutation.
- If a callback should run later, give it a parameter: onClick=\${e => save()}.

  const apiKey = (await resources.view('secrets/openai')).content;

        return (

          ) || null
        );

      function useMessageActions({ agent, sendMessage }) {
        const [editingMessageId, setEditingMessageId] = createSignal(null);
        const currentTurnSettings = () => ({
          modelId: agent.modelId || DEFAULT_MODEL_ID,
          reasoningMode: agent.reasoningMode || false,
        });

        function handleComposerKeyDown(event) {
          if (event.key === "Enter" && !event.shiftKey && !agent.loading) {
            event.preventDefault();
            event.target?.closest("form")?.requestSubmit();
          }
        }

        async function submitForm(event) {
          event.preventDefault();
          const form = event.target;
          const text = form.userMessage.value;
          const files = Array.from(form.userFiles.files || []);
          const modelId = form.modelId.value;
          const reasoningMode = form.reasoningMode.checked;
          await sendMessage(text, files, modelId, reasoningMode);
          form.userMessage.value = "";
          form.userFiles.value = "";
        }

        async function replayMessage(message, { forkFromId = message?.id, newText } = {}) {
          const replay = getReplayContent(message, newText);
          if (!replay.content.length) return;

          const { modelId, reasoningMode } = currentTurnSettings();
          await sendMessage(replay.text, [], modelId, reasoningMode, forkFromId, replay.content);
        }

        function getRetrySourceMessage(message) {
          if (message.role === "user") return message;
          if (message.role !== "assistant") return null;

          const idx = agent.messages.findIndex((m) => m.id === message.id);
          return (
            agent.messages
              .slice(0, idx)
              .reverse()
              .find((m) => m.role === "user") || null
          );
        }

        async function saveEdit(messageId, newText) {
          const msg = agent.messageTree?.nodes.get(messageId)?.message;
          const originalText = msg?.content.find((c) => c.text)?.text;
          if (msg && newText && newText !== originalText)
            await replayMessage(msg, { forkFromId: messageId, newText });
          setEditingMessageId(null);
        }

        async function copyMessage(message) {
          const text = message.content?.find((c) => c.text)?.text;
          if (text) await navigator.clipboard.writeText(text);
        }

        async function retryMessage(message) {
          const sourceMessage = getRetrySourceMessage(message);
          if (sourceMessage) await replayMessage(sourceMessage);
        }

        return {
          editingMessageId,
          handleComposerKeyDown,
          submitForm,
          saveEdit,
          copyMessage,
          retryMessage,
          startEdit: (msg) => setEditingMessageId(msg.id),
          cancelEdit: (_) => setEditingMessageId(null),
        };
      }

      function useAgentAdmin({ agent, changeAgent, renameThread, params, db }) {
        const [showConfigModal, setShowConfigModal] = createSignal(false);
        const [showAgentModal, setShowAgentModal] = createSignal(false);
        const [showTitleModal, setShowTitleModal] = createSignal(false);
        const [mcpServers, setMCPServers] = createSignal([]);
        const [proxyConfig, setProxyConfigSignal] = createSignal(null);
        const [visibleAgents, setVisibleAgents] = createSignal([]);
        const [currentAgentRecord, setCurrentAgentRecord] = createSignal(null);
        const [agentDraft, setAgentDraft] = createSignal(createAgentDraft());
        const currentTitle = () => agent.thread.name || "New conversation";
        let refreshVersion = 0;

        async function refreshCurrentAgent(agentId = params.agentId || 1) {
          const currentAgentId = +agentId || 1;
          const version = ++refreshVersion;
          const allAgents = (await db.getAll("agents")).sort((a, b) => (a.id || 0) - (b.id || 0));
          if (version !== refreshVersion || currentAgentId !== +(params.agentId || 1)) return null;
          const current = allAgents.find((agent) => agent.id === currentAgentId) || null;
          setVisibleAgents(allAgents.filter((agent) => !agent.hiddenFromPicker));
          setCurrentAgentRecord(current);
          setMCPServers(current?.mcpServers || []);
          setProxyConfigSignal(current?.proxyConfig || null);
          syncRuntimeState(current);
          return current;
        }

        createEffect(() => {
          refreshCurrentAgent(params.agentId || 1);
        });

        async function saveSettings(servers, proxy) {
          const agentId = params.agentId || 1;
          const agentRecord = await db.get("agents", agentId);
          if (agentRecord) {
            await db.put("agents", { ...agentRecord, mcpServers: servers, proxyConfig: proxy });
            clearMcpSessions(agentId);
            await refreshCurrentAgent(agentId);
          }
          setShowConfigModal(false);
        }

        function openEditAgent() {
          setAgentDraft(
            createAgentDraft(
              currentAgentRecord() || { id: params.agentId || 1, name: agent.name || "" }
            )
          );
          setShowAgentModal(true);
        }

        function openNewAgent() {
          setAgentDraft(createAgentDraft({ hiddenFromPicker: false }));
          setShowAgentModal(true);
        }

        async function saveAgent(nextAgent) {
          const record = createAgentDraft({ ...(currentAgentRecord() || {}), ...nextAgent });
          const isNewAgent = !record.id;
          if (!record.id) delete record.id;
          const saved = await upsert(db, "agents", record);
          await refreshCurrentAgent(saved.id);
          setShowAgentModal(false);
          if (isNewAgent && !saved.hiddenFromPicker) await changeAgent(saved.id);
        }

        async function saveTitle(title) {
          await renameThread(title);
          setShowTitleModal(false);
        }

        return {
          showConfigModal,
          showAgentModal,
          showTitleModal,
          mcpServers,
          proxyConfig,
          visibleAgents,
          currentAgentRecord,
          agentDraft,
          currentTitle,
          openConfigModal: (_) => setShowConfigModal(true),
          closeConfigModal: (_) => setShowConfigModal(false),
          openEditAgent,
          openNewAgent,
          closeAgentModal: (_) => setShowAgentModal(false),
          saveAgent,
          openTitleModal: (_) => setShowTitleModal(true),
          closeTitleModal: (_) => setShowTitleModal(false),
          saveSettings,
          saveTitle,
        };
      }

      function useAgent({ agentId, threadId }, db, tools = TOOLS) {
        agentId = +agentId || 1;
        threadId = +threadId || null;

        const [params, setParams] = createStore({ agentId, threadId });
        const [agent, setAgent] = createStore(createEmptyAgentState());
        let agentLoadVersion = 0;
        let historyLoadVersion = 0;

        createEffect(() => {
          const currentAgentId = params.agentId;
          const currentThreadId = params.threadId;
          const version = ++agentLoadVersion;

          (async () => {
            const record = await db.get("agents", currentAgentId);
            if (!record) return;
            if (
              version !== agentLoadVersion ||
              currentAgentId !== params.agentId ||
              currentThreadId !== params.threadId
            )
              return;

            setAgent({
              id: record.id,
              name: record.name,
              systemPrompt: record.systemPrompt,
              tools: getToolsByNames(record.tools || [], tools),
            });
            if (!currentThreadId && !agent.loading) {
              setAgent("modelId", record.defaultModelId || DEFAULT_MODEL_ID);
              setAgent("reasoningMode", false);
            }
          })();
        });

        // Effects: Load history
        createEffect(() => {
          const currentThreadId = params.threadId;
          const version = ++historyLoadVersion;
          if (!currentThreadId) return;

          (async () => {
            const history = await db.getAllFromIndex("messages", "threadId", currentThreadId);
            if (!history?.length) return;
            if (version !== historyLoadVersion || currentThreadId !== params.threadId) return;

            const thread = await db.get("threads", currentThreadId);
            if (version !== historyLoadVersion || currentThreadId !== params.threadId) return;
            setAgent(buildThreadState(history, thread, currentThreadId));
          })();
        });

        // Effects: Save changes
        createEffect(() => {
          if (!params.threadId || !agent.thread.id) return;
          const threadRecord = {
            id: params.threadId,
            agentId: params.agentId,
            name: agent.thread.name,
            summaryMessageId: agent.thread.summaryMessageId ?? null,
          };
          upsert(db, "threads", threadRecord);
        });

        async function ensureActiveThread(text) {
          let activeThreadId = params.threadId;
          let threadName = agent.thread.name;
          if (!activeThreadId) {
            threadName = makeConversationTitle(text);
            activeThreadId = await db.add("threads", {
              agentId: params.agentId,
              name: threadName,
              summaryMessageId: null,
              visibility: "normal",
            });
            setParams("threadId", activeThreadId);
            setAgent("thread", { id: activeThreadId, name: threadName, summaryMessageId: null });
          }
          return { activeThreadId, threadName };
        }

        async function startUserTurn({ text, files, modelId, forkFromId, contentOverride }) {
          const { activeThreadId, threadName } = await ensureActiveThread(text);
          const record = await db.get("agents", +params.agentId);
          const agentTools = getToolsByNames(record.tools || [], tools);
          const client = await getClientForModel(modelId);
          const content = contentOverride || (await getMessageContent(text, files));
          const parentId =
            forkFromId !== null
              ? (agent.messageTree?.nodes.get(forkFromId)?.message?.parentId ?? null)
              : (agent.activeLeafId ?? null);

          const userMessage = { role: "user", content, parentId, createdAt: Date.now() };
          const savedId = await db.add("messages", {
            ...userMessage,
            agentId: params.agentId,
            threadId: activeThreadId,
          });
          userMessage.id = savedId;

          const allMessages = await db.getAllFromIndex("messages", "threadId", activeThreadId);
          const tree = buildMessageTree(allMessages);
          const branchState = buildActivePathState(tree, getPathToMessage(tree, userMessage.id));

          return {
            activeThreadId,
            threadName,
            record,
            agentTools,
            client,
            userMessage,
            tree,
            branchState,
          };
        }

        // Actions
        async function sendMessage(
          text,
          files = [],
          modelId,
          reasoningMode,
          forkFromId = null,
          contentOverride = null
        ) {
          setAgent("loading", true);
          try {
            const {
              activeThreadId,
              threadName,
              record,
              agentTools,
              client,
              userMessage,
              tree,
              branchState,
            } = await startUserTurn({ text, files, modelId, forkFromId, contentOverride });

            setAgent({
              id: record.id,
              thread: {
                id: activeThreadId,
                name: threadName,
                summaryMessageId: agent.thread.summaryMessageId ?? null,
              },
              modelId,
              reasoningMode,
              name: record.name,
              systemPrompt: record.systemPrompt,
              tools: agentTools,
              messages: branchState.messages,
              messageTree: tree,
              activePath: branchState.activePath,
              activeLeafId: branchState.activeLeafId,
            });

            await runAgentWithBranching(
              agent,
              setAgent,
              client,
              userMessage.id,
              { agentId: params.agentId, threadId: activeThreadId },
              db
            );
          } finally {
            setAgent("loading", false);
          }
        }

        function switchBranch(newMessageId) {
          const tree = agent.messageTree;
          if (!tree) return;
          setAgent(buildActivePathState(tree, getPathToMessage(tree, newMessageId)));
        }

        async function changeAgent(nextAgentId) {
          const targetAgentId = +nextAgentId || 1;
          const currentRecord = await db.get("agents", targetAgentId);
          setParams({ agentId: targetAgentId, threadId: null });
          setAgent({
            ...createEmptyAgentState(),
            id: currentRecord?.id ?? null,
            name: currentRecord?.name ?? null,
            systemPrompt: currentRecord?.systemPrompt ?? null,
            modelId: currentRecord?.defaultModelId || DEFAULT_MODEL_ID,
            tools: getToolsByNames(currentRecord?.tools || [], tools),
          });
        }

        async function renameThread(name) {
          if (!params.threadId) return;
          const nextName = name?.trim() || "Untitled";
          setAgent("thread", "name", nextName);
          const thread = await db.get("threads", params.threadId);
          if (thread) await db.put("threads", { ...thread, name: nextName });
        }

        return { agent, params, setAgent, sendMessage, switchBranch, changeAgent, renameThread };
      }

      function setSearchParams(obj) {
        const params = new URLSearchParams(window.location.search);
        Object.entries(obj).forEach(([k, v]) => {
          if (v == null) params.delete(k);
          else params.set(k, v);
        });
        window.history.replaceState({}, "", `${window.location.pathname}?${params}`);
      }

      async function upsert(db, table, obj, key = "id") {
        if (obj[key] == null) {
          const id = await db.add(table, obj);
          return { ...obj, [key]: id };
        }
        const existing = await db.get(table, obj[key]);
        if (existing) {
          const updated = { ...existing, ...obj };
          await db.put(table, updated);
          return updated;
        } else {
          const id = await db.add(table, obj);
          return { ...obj, [key]: id };
        }
      }

      function cloneContentBlocks(content = []) {
        return structuredClone(unwrap(content));
      }

      function withUpdatedTextBlock(content = [], newText = "") {
        const next = cloneContentBlocks(content);
        const textBlock = next.find((block) => block.text !== undefined);
        if (textBlock) textBlock.text = newText;
        else next.unshift({ text: newText });
        return next;
      }

      function getReplayContent(message, newText) {
        const content =
          newText === undefined
            ? cloneContentBlocks(message?.content || [])
            : withUpdatedTextBlock(message?.content || [], newText);
        return { text: getMessageText({ content }), content };
      }

      function getTextView(content = "", viewRange) {
        if (!Array.isArray(viewRange) || viewRange.length === 0) return content;
        const lines = String(content).split("\n");
        const start = Math.max(1, +viewRange[0] || 1);
        const endLine =
          +viewRange[1] === -1
            ? lines.length
            : Math.min(lines.length, +viewRange[1] || lines.length);
        if (start > endLine) return "";
        return lines.slice(start - 1, endLine).join("\n");
      }

      function normalizeResourcePath(path = "") {
        return String(path)
          .replace(/^\/+|\/+$/g, "")
          .replace(/\/+/g, "/");
      }

      /** @returns {ResourceScope} */
      function getResourceScope(path = "") {
        if (path.startsWith("skills/")) return "agent";
        if (path.startsWith("memories/")) return "agent";
        return "thread";
      }

      async function getVisibleResources(db, { threadId = null, agentId = null } = {}) {
        const threadResources = threadId
          ? await db.getAllFromIndex("resources", "threadId", threadId)
          : [];
        const agentResources = agentId
          ? (await db.getAllFromIndex("resources", "agentId", agentId)).filter(
              (resource) => !resource.threadId || resource.threadId === threadId
            )
          : [];

        const byPath = new Map();
        for (const resource of agentResources) byPath.set(resource.path, resource);
        for (const resource of threadResources) byPath.set(resource.path, resource);
        return Array.from(byPath.values());
      }

      async function getVisibleResource(db, path, context = {}) {
        const normPath = normalizeResourcePath(path);
        const resources = await getVisibleResources(db, context);
        return resources.find((resource) => resource.path === normPath) || null;
      }

      async function saveResourceContent(
        db,
        path,
        content,
        { threadId = null, agentId = null, scope = "auto" } = {}
      ) {
        const normPath = normalizeResourcePath(path);
        const existing = await getVisibleResource(db, normPath, { threadId, agentId });
        if (existing) {
          await db.put("resources", {
            ...existing,
            path: normPath,
            content,
            updatedAt: Date.now(),
          });
          return;
        }

        const resolvedScope = scope === "auto" ? getResourceScope(normPath) : scope;
        const resource = { path: normPath, content, createdAt: Date.now() };
        if (agentId) resource.agentId = agentId;
        if (resolvedScope === "thread" && threadId) resource.threadId = threadId;
        await db.add("resources", resource);
      }

      function extractSSEDataEvents(text = "") {
        const events = [];
        let current = [];

        for (const rawLine of String(text).split(/\r?\n/)) {
          if (rawLine.startsWith("data:")) {
            current.push(rawLine.slice(5).replace(/^ /, ""));
            continue;
          }
          if (!rawLine.trim()) {
            if (current.length) {
              events.push(current.join("\n"));
              current = [];
            }
          }
        }

        if (current.length) events.push(current.join("\n"));
        return events.filter(Boolean);
      }

      function createBridgeToken() {
        return `bridge_${crypto.randomUUID?.() || Math.random().toString(36).slice(2)}`;
      }

      function escapeInlineScript(text = "") {
        return String(text).replace(/<\/script/gi, "<\\/script");
      }

      function slugify(text = "") {
        return String(text)
          .toLowerCase()
          .trim()
          .replace(/[^a-z0-9]+/g, "-")

      async function wouldCreateDelegationCycle(db, threadId, currentAgentId, targetAgentId) {
        if (targetAgentId == null) return false;
        if (currentAgentId != null && +currentAgentId === +targetAgentId) return true;

        let nextThreadId = threadId;
        const seenThreadIds = new Set();
        while (nextThreadId != null && !seenThreadIds.has(nextThreadId)) {
          seenThreadIds.add(nextThreadId);
          const thread = await db.get("threads", nextThreadId);
          if (!thread) break;
          if (+thread.agentId === +targetAgentId) return true;
          nextThreadId = thread.parentThreadId ?? null;
        }
        return false;
      }

      function buildBridgeScript(token, proxyConfig = getProxyConfig()) {
        return `
      (() => {
        const token = ${JSON.stringify(token)};
        const proxyConfig = ${JSON.stringify(proxyConfig)};
        const parentOrigin = ${JSON.stringify(window.location.origin)};
        let port = null;
        const pending = new Map();
        const ready = [];
        let nextId = 0;

        const whenReady = fn => port ? fn() : ready.push(fn);
        const flushReady = () => { while (ready.length) ready.shift()(); };
        const send = (type, payload = {}) => port?.postMessage({ token, type, ...payload });
        const asText = args => args.map(value => {
          try { return typeof value === "string" ? value : JSON.stringify(value); }
          catch { return String(value); }
        }).join(" ");

        addEventListener("message", event => {
          const data = event.data || {};
          if (data.type !== "bridge-init" || data.token !== token || !event.ports?.[0]) return;
          port = event.ports[0];
          port.onmessage = reply => {
            const message = reply.data || {};
            if (message.token !== token) return;
            const request = pending.get(message.id);
            if (!request) return;
            pending.delete(message.id);
            message.error ? request.reject(new Error(message.error)) : request.resolve(message.result);
          };
          flushReady();
        });

        ["log", "warn", "error", "info", "debug"].forEach(name => {
          const original = console[name];
          console[name] = (...args) => {
            try { send("log", { msg: asText(args) }); } catch {}
            original?.apply(console, args);
          };
        });
        addEventListener("error", event => send("log", { msg: String(event.message || event.error || "error") }));
        addEventListener("unhandledrejection", event => send("log", { msg: "UnhandledRejection: " + (event?.reason?.stack || event?.reason?.message || event?.reason || "") }));

        const call = (type, payload = {}) => new Promise((resolve, reject) => {
          whenReady(() => {
            const id = ++nextId;
            pending.set(id, { resolve, reject });
            port.postMessage({ token, type, id, ...payload });
          });
        });

        const nativeFetch = window.fetch.bind(window);
        window.fetch = async (url, options = {}) => {
          try {
            const target = new URL(url, parentOrigin);
            const isLocal = ["localhost", "127.0.0.1", "[::1]"].some(host => target.hostname === host || target.hostname.endsWith(".localhost"));
            if (!proxyConfig?.endpoint || isLocal) return nativeFetch(url, options);

            const proxyUrl = proxyConfig.endpoint.replace(/\\/+$/, "") + "/" + target.href;
            const headers = new Headers(options.headers || {});
            if (proxyConfig.headerName && proxyConfig.headerValue) {
              headers.set(proxyConfig.headerName, proxyConfig.headerValue);
            }
            return nativeFetch(proxyUrl, { ...options, headers });
          } catch (error) {
            console.log(error);
            return nativeFetch(url, options);
          }
        };

        window.resources = {
          create: (path, content) => call("resources", { command: "create", args: { path, file_text: content } }),
          view: path => call("resources", { command: "view", args: { path } }),
          list: (path = "/") => call("resources", { command: "view", args: { path: path.endsWith("/") ? path : path + "/" } }),
          delete: path => call("resources", { command: "delete", args: { path } }),
          rename: (path, new_path) => call("resources", { command: "rename", args: { path, new_path } }),
          replace: (path, old_str, new_str) => call("resources", { command: "str_replace", args: { path, old_str, new_str } }),
        };

        window.__sandboxBridge = {
          runModule(source) {
            whenReady(async () => {
              try {
                const blob = new Blob([source], { type: "text/javascript" });
                const url = URL.createObjectURL(blob);
                try { await import(url); }
                finally { URL.revokeObjectURL(url); }
              } catch (error) {
                send("log", { msg: error?.stack || error?.message || String(error) });
              }
              send("done");
            });
          },
          finishOnLoad() {
            whenReady(() => {
              const done = () => send("done");
              if (document.readyState === "complete") done();
              else addEventListener("load", done, { once: true });
            });
          },
          startPreview() {
            whenReady(() => {
              const report = () => {
                const height = Math.max(document.documentElement?.scrollHeight || 0, document.body?.scrollHeight || 0);
                if (height) send("resize", { height: height + 20 });
              };
              if ("ResizeObserver" in window) {
                const observer = new ResizeObserver(report);
                if (document.documentElement) observer.observe(document.documentElement);
                if (document.body) observer.observe(document.body);
                addEventListener("beforeunload", () => observer.disconnect(), { once: true });
              }
              if (document.readyState === "complete") report();
              else addEventListener("load", report, { once: true });
              setTimeout(report, 0);
            });
          }
        };
      })();
    `;
      }

      function buildPreviewDoc(token, content = "") {
        const bridge = buildBridgeScript(token);
        return (
          `<!doctype html><meta charset=utf-8><scr` +
          `ipt>${bridge}</scr` +
          `ipt>${content}<scr` +
          `ipt>window.__sandboxBridge.startPreview();</scr` +
          `ipt>`
        );
      }

      function buildCodeDoc(token, source = "", language = "js") {
        const bridge = buildBridgeScript(token);
        if (!language || ["js", "javascript"].includes(language)) {
          const safeSource = escapeInlineScript(source);
          return (
            `<!doctype html><meta charset=utf-8><scr` +
            `ipt>${bridge}</scr` +
            `ipt><scr` +
            `ipt>window.__sandboxBridge.runModule(${JSON.stringify(safeSource)});</scr` +
            `ipt>`
          );
        }
        return (
          `<!doctype html><meta charset=utf-8><scr` +
          `ipt>${bridge}</scr` +
          `ipt>${source}<scr` +
          `ipt>window.__sandboxBridge.startPreview(); window.__sandboxBridge.finishOnLoad();</scr` +
          `ipt>`
        );
      }

      function loadSandboxFrame(frame, token, srcdoc, onMessage) {
        const channel = new MessageChannel();
        const handleLoad = () =>
          frame.contentWindow?.postMessage({ type: "bridge-init", token }, "*", [channel.port2]);
        channel.port1.onmessage = (event) => {
          const data = event.data || {};
          if (data.token !== token) return;
          onMessage?.(data, channel.port1);
        };
        frame.addEventListener("load", handleLoad, { once: true });
        frame.srcdoc = srcdoc;
        return () => {
          channel.port1.onmessage = null;
          channel.port1.close();
        };
      }

      function MessageContent(props) {
        // IMPORTANT: Access store array indices directly to track reactivity.
        // Using .slice() breaks SolidJS store tracking since it creates a plain array.
        const findToolResult = (toolUseId) => {
          const msgs =
            typeof props.allMessages === "function" ? props.allMessages() : props.allMessages;
          if (!msgs) return;
          for (let i = msgs.length - 1; i >= 0; i--) {
            const { content } = msgs[i];
            for (const c of content) {
              if (c.toolResult?.toolUseId === toolUseId) {
                return c.toolResult;
              }
            }
          }
        };

        const c = () => props.content;
        const m = () => props.message;
        const editingId = () =>
          typeof props.editingId === "function" ? props.editingId() : props.editingId;
        const isText = () => c().text !== undefined;
        const isSummary = () => isText() && isConversationSummaryText(c().text);
        const isUserText = () => isText() && m().role === "user";
        const isAssistantText = () => isText() && m().role === "assistant";

        return html`
          <${Switch}>
            <${Match} when=${() => isSummary()}>
              <details class="small rounded border p-2 bg-light">
                <summary class="cursor-pointer text-dark">Conversation Summary</summary>
                <div class="my-2 text-pre">${() => getConversationSummaryBody(c().text)}</div>
              </details>
            <//>
            <${Match} when=${isUserText}>
              <${Show}
                when=${() => editingId() === m().id}
                fallback=${html`<div
                  class="small rounded p-2 text-dark bg-secondary-subtle d-inline-block text-pre"
                >
                  ${() => c().text}
                </div>`}
              >
                <${EditableMessage}
                  text=${() => c().text}
                  onSave=${(text) => props.onSave?.(m().id, text)}
                  onCancel=${props.onCancel}
                />
              <//>
            <//>
            <${Match} when=${isAssistantText}>
              <div class="small p-2 text-pre">${() => c().text}</div>
            <//>
            <${Match} when=${() => !isText()}>
              <${ToolUseContent} content=${c} findToolResult=${findToolResult} />
            <//>
          <//>
        `;
      }

      function ToolUseContent(props) {
        const c = () => (typeof props.content === "function" ? props.content() : props.content);
        const toolName = () => c().toolUse?.name;
        const toolUseId = () => c().toolUse?.toolUseId;
        const toolResult = () => props.findToolResult?.(toolUseId())?.content?.[0]?.json?.result;
        const toolInput = () => parseJSON(c().toolUse?.input || "{}");
        const reasoningText = () => c().reasoningContent?.reasoningText?.text;
        const isReasoning = () => Boolean(reasoningText()) || toolName() === "think";
        const builtInResult = () =>
          renderBuiltInToolResult({ toolName: toolName(), toolInput, toolResult, toolUseId });

        return html`
          <${Switch}>
            <${Match} when=${isReasoning}>
              <details class="small rounded border p-2">
                <summary class="cursor-pointer text-dark">View Reasoning</summary>
                <p class="my-2 text-muted">${() => reasoningText() || toolInput()?.thought}</p>

            <//>
            <${Match} when=${builtInResult}> ${builtInResult} <//>
            <${Match} when=${() => c().toolUse}>
              <details class="small rounded border p-2">
                <summary class="cursor-pointer text-dark">${toolName}</summary>
                <div class="my-2 text-muted text-pre">

            <//>

        `;

      function BranchNav(props) {

        return html`

                class="btn btn-sm btn-link text-decoration-none p-0 text-muted"

              <span class="tabular-nums min-w-10 text-center"
                >${() => index() + 1}/${() => siblings().length}</span

                type="button"
                class="btn btn-sm btn-link text-decoration-none p-0 text-muted"

      function EditableMessage(props) {

        return html`

        `;

      // #region 8. UI TOOL RESULTS
      // =============================================================================
      // Result cards for editor, code, MCP, and delegated tasks.

      function EditorResult(props) {
        const r = () => props.result;
        const isHtml = () => r()?.path?.endsWith(".html");
        const download = () => {
          const content = r()?.content;
          const path = r()?.path || "file.txt";
          if (content === undefined) return;
          const blob = new Blob([content], { type: "text/plain" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = path.split("/").pop() || "file.txt";
          a.click();
          URL.revokeObjectURL(url);
        };
        return html`
          <div class="editor-result small border rounded overflow-hidden mb-1">
            <div
              class="px-2 py-1 bg-secondary-subtle text-muted border-bottom d-flex justify-content-between align-items-center"
            >
              <span>${() => r()?.path || (r()?.error ? "Error" : "...")}</span>
              <${Show} when=${() => r()?.content !== undefined}>
                <button
                  type="button"
                  class="btn btn-sm btn-link p-0 text-muted"
                  onClick=${download}
                  title="Download"
                >
                  <i class="bi bi-download"></i>
                </button>
              <//>
            </div>
            <${Show} when=${() => isHtml() && r()?.content !== undefined}>
              <${HtmlPreview} content=${() => r().content} />
            <//>
            <${Show} when=${() => !isHtml() && r()?.content !== undefined}>
              <pre class="m-0 p-2 text-pre" style="max-height: 300px; overflow: auto;">
${() => r().content}</pre
              >
            <//>
            <${Show} when=${() => r()?.entries}>
              <div class="p-2 text-pre">
                ${() => (r().entries.length ? r().entries.join("\n") : "(empty)")}
              </div>
            <//>
            <${Show} when=${() => r()?.error}>
              <div class="p-2 text-danger">${() => r().error}</div>
            <//>
            <${Show} when=${() => r()?.status === "deleted"}>
              <div class="p-2 text-muted">Deleted</div>
            <//>
          </div>
        `;
      }

      function renderBuiltInToolResult({ toolName, toolInput, toolResult, toolUseId }) {
        if (toolName === "editor") return html`<${EditorResult} result=${toolResult} />`;
        if (toolName === "code")
          return html`<${CodeResult} input=${toolInput} result=${toolResult} />`;
        if (toolName === "mcp") return html`<${McpResult} result=${toolResult} />`;
        if (toolName === "task")
          return html`<${TaskResult} result=${toolResult} toolUseId=${toolUseId} />`;
        return null;
      }

      function CodeResult(props) {

              <span>${() => input()?.filename || lang()}</span>
            </div>
            <${Show} when=${() => isHtml() && result()?.source}>

${() => input().source}</pre

${() => result().logs.join("\n")}</pre

      function McpResult(props) {
        const r = () => props.result;

            return text;
          }

        return html`
          <div class="mcp-result small border rounded overflow-hidden mb-1">
            <div class="px-2 py-1 bg-secondary-subtle text-muted border-bottom">
              <span>${() => r()?.server || "mcp"}</span>
            </div>
            <${Show} when=${() => r()?.error}>
              <div class="p-2 text-danger">${() => r().error}</div>
            <//>
            <${Show} when=${() => r()?.servers}>
              <div class="p-2 text-pre">
                ${() =>
                  r()
                    .servers.map((s) => `${s.enabled ? "●" : "○"} ${s.name} - ${s.url}`)
                    .join("\n")}
              </div>
            <//>
            <${Show} when=${() => r()?.tools}>
              <div class="p-2 text-pre">
                ${() =>
                  r()
                    .tools.map((t) => `${t.name}${t.description ? ` - ${t.description}` : ""}`)

              </div>
            <//>
            <${Show} when=${() => r()?.resources}>
              <div class="p-2 text-pre">
                ${() =>
                  r()

              </div>
            <//>
            <${Show} when=${() => r()?.prompts}>

                ${() =>

      // Renders a single message from a subagent conversation
      function SubagentMessageBubble(props) {
        const m = () => props.message;
        const isToolResult = () => m()?.content?.some((c) => c.toolResult);
        const displayRole = () => (isToolResult() ? "tool" : m()?.role);

        const renderContent = (content) => {
          if (!content) return "";
          return content
            .map((c) => {
              if (c.text) return c.text;
              if (c.toolUse)
                return `[${c.toolUse.name}] ${JSON.stringify(c.toolUse.input || {}, null, 2).slice(0, 200)}...`;
              if (c.toolResult) {
                const result = c.toolResult.content?.[0]?.json?.result;
                const preview =
                  typeof result === "string"
                    ? result.slice(0, 200)
                    : JSON.stringify(result || {}, null, 2).slice(0, 200);
                return `Result: ${preview}${preview.length >= 200 ? "..." : ""}`;
              }
              if (c.reasoningContent?.reasoningText?.text)
                return `[Thinking...] ${c.reasoningContent.reasoningText.text.slice(0, 100)}...`;
              return "";
            })
            .filter(Boolean)
            .join("\n");
        };

        return html`
          <div
            class="mb-2"
            classList=${() => ({ "ps-3 border-start border-2": displayRole() === "tool" })}
          >
            <div class="d-flex align-items-center gap-1 text-muted small mb-1">
              <span class="fw-semibold">${displayRole}</span>
            </div>
            <div class="text-pre small" style="max-height: 150px; overflow: auto;">
              ${() => renderContent(m()?.content)}
            </div>
          </div>
        `;
      }

      function RunningTaskResult(props) {
        const runningState = () => props.runningState;

        return html`
          <div class="bg-body-tertiary p-2 border-top" style="max-height: 400px; overflow: auto;">
            <${For} each=${() => runningState()?.messages || []}>
              ${(msg) => html`<${SubagentMessageBubble} message=${msg} />`}
            <//>
            <${Show} when=${() => runningState()?.currentMessage?.content?.length > 0}>
              <div class="opacity-75 mb-2">
                <div class="d-flex align-items-center gap-1 text-muted small mb-1">
                  <span class="fw-semibold">assistant</span>
                  <span class="spinner-grow spinner-grow-sm"></span>
                </div>
                <div class="text-pre small" style="max-height: 150px; overflow: auto;">
                  ${() => {
                    const content = runningState()?.currentMessage?.content || [];
                    return content
                      .map((c) => c.text || "")
                      .filter(Boolean)
                      .join("\n");
                  }}
                </div>
              </div>
            <//>
          </div>
        `;
      }

      function CompletedTaskResult(props) {
        const r = () => props.result;
        const [expanded, setExpanded] = createSignal(false);
        const [fullMessages, setFullMessages] = createSignal([]);

        createEffect(async () => {
          if (expanded() && r()?.subagentThreadId) {
            const msgs = await db.getAllFromIndex("messages", "threadId", r().subagentThreadId);
            setFullMessages(msgs.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0)));
          }
        });

        return html`
          <${Show} when=${() => r()?.error}>
            <div class="p-2 text-danger">${() => r().error}</div>
          <//>
          <${Show} when=${() => r()?.summary}>
            <div class="p-2 text-pre">${() => r().summary}</div>
          <//>
          <${Show} when=${() => r()?.subagentThreadId}>
            <div class="px-2 pb-2">
              <button
                type="button"
                class="btn btn-sm btn-link p-0 text-muted"
                onClick=${(_) => setExpanded((e) => !e)}
              >
                <i class=${() => `bi ${expanded() ? "bi-chevron-up" : "bi-chevron-down"} me-1`}></i>
                ${() => (expanded() ? "Hide conversation" : "View full conversation")}
              </button>
            </div>
          <//>
          <${Show} when=${expanded}>
            <div class="bg-body-tertiary border-top p-2" style="max-height: 500px; overflow: auto;">
              <${For} each=${fullMessages}>
                ${(msg) => html`<${SubagentMessageBubble} message=${msg} />`}
              <//>
              <${Show} when=${() => fullMessages().length === 0}>
                <div class="text-muted small">Loading conversation...</div>
              <//>
            </div>
          <//>
        `;
      }

      function TaskResult(props) {
        const r = () => props.result;
        const toolUseId = () =>
          typeof props.toolUseId === "function" ? props.toolUseId() : props.toolUseId;
        const runningState = () => runningSubagents().get(toolUseId());
        const isRunning = () => runningState()?.status === "running";

        return html`
          <div class="task-result small border rounded overflow-hidden mb-1">
            <div
              class="px-2 py-1 bg-secondary-subtle d-flex justify-content-between align-items-center"
            >
              <span class="text-muted">
                <i class="bi bi-robot me-1"></i>
                ${() => getDelegationLabel(r(), runningState())} agent
              </span>
              <span class="text-muted">
                ${() =>
                  isRunning() ? html`<i class="bi bi-arrow-repeat spin me-1"></i> Running...` : ""}
                ${() => (r()?.turns ? `${r().turns} turns` : "")}
              </span>
            </div>
            <${Show} when=${isRunning} fallback=${html`<${CompletedTaskResult} result=${r()} />`}>
              <${RunningTaskResult} runningState=${runningState()} />
            <//>
          </div>
        `;
      }

      function AgentConfigModal(props) {
        const [servers, setServers] = createSignal([...(props.servers || [])]);
        const [newName, setNewName] = createSignal("");
        const [newUrl, setNewUrl] = createSignal("");

        // Proxy settings from props (not localStorage)
        const pc = props.proxyConfig || {};
        const [proxyEndpoint, setProxyEndpoint] = createSignal(pc.endpoint || "");
        const [proxyHeaderName, setProxyHeaderName] = createSignal(pc.headerName || "");
        const [proxyHeaderValue, setProxyHeaderValue] = createSignal(pc.headerValue || "");

        const addServer = () => {
          const name = newName().trim();
          const url = newUrl().trim();
          if (!name || !url) return;
          setServers([...servers(), { name, url, enabled: true }]);
          setNewName("");
          setNewUrl("");
        };

        const removeServer = (index) => {
          setServers(servers().filter((_, i) => i !== index));
        };

        const toggleServer = (index) => {
          setServers(servers().map((s, i) => (i === index ? { ...s, enabled: !s.enabled } : s)));
        };

        const updateServer = (index, field, value) => {
          setServers(servers().map((s, i) => (i === index ? { ...s, [field]: value } : s)));
        };

        const handleSave = () => {
          // Build proxy config object
          const endpoint = proxyEndpoint().trim();
          const proxy = endpoint
            ? {
                endpoint,
                headerName: proxyHeaderName().trim(),
                headerValue: proxyHeaderValue().trim(),
              }
            : null;
          // Save both MCP servers and proxy config
          props.onSave?.(servers(), proxy);
        };

        return html`
          <${ModalFrame}
            title="Settings"
            onClose=${props.onClose}
            footer=${html`
              <button type="button" class="btn btn-secondary" onClick=${(_) => props.onClose?.()}>
                Cancel
              </button>
              <button type="button" class="btn btn-primary" onClick=${handleSave}>Save</button>
            `}
          >
            <h6 class="mb-2">CORS Proxy</h6>
            <p class="small text-muted mb-2">
              Route external requests through a proxy to bypass CORS restrictions.
            </p>
            <div class="mb-2">
              <input
                class="form-control form-control-sm"
                placeholder="Proxy endpoint (e.g., https://proxy.example.com/)"
                value=${proxyEndpoint}
                onInput=${(e) => setProxyEndpoint(e.target.value)}
              />
            </div>
            <div class="d-flex gap-2 mb-3">
              <input
                class="form-control form-control-sm"
                style="flex: 1"
                placeholder="Header name (e.g., X-PROXY-API-KEY)"
                value=${proxyHeaderName}
                onInput=${(e) => setProxyHeaderName(e.target.value)}
              />
              <input
                class="form-control form-control-sm"
                style="flex: 2"
                type="password"
                placeholder="Header value (API key)"
                value=${proxyHeaderValue}
                onInput=${(e) => setProxyHeaderValue(e.target.value)}
              />
            </div>

            <h6 class="mb-2 mt-4 pt-3 border-top">MCP Servers</h6>
            <p class="small text-muted mb-2">
              Configure MCP servers. Servers must support SSE/HTTP transport.
            </p>

            <${Show} when=${() => servers().length === 0}>
              <div class="text-muted small mb-3">No servers configured yet.</div>
            <//>

            <${For} each=${servers}>
              ${(server, index) => html`
                <div class="d-flex align-items-center gap-2 mb-2">
                  <input
                    type="checkbox"
                    class="form-check-input"
                    checked=${() => server.enabled}
                    onChange=${(_) => toggleServer(index())}
                    title="Enable/disable server"
                  />
                  <input
                    class="form-control form-control-sm"
                    style="flex: 1"
                    value=${() => server.name}
                    placeholder="Name"
                    onChange=${(e) => updateServer(index(), "name", e.target.value)}
                  />
                  <input
                    class="form-control form-control-sm"
                    style="flex: 2"
                    value=${() => server.url}
                    placeholder="URL"
                    onChange=${(e) => updateServer(index(), "url", e.target.value)}
                  />
                  <button
                    type="button"
                    class="btn btn-sm btn-outline-danger"
                    onClick=${(_) => removeServer(index())}
                    title="Remove server"
                  >
                    <i class="bi bi-x"></i>
                  </button>
                </div>
              `}
            <//>

            <div class="d-flex gap-2 mt-2">
              <input
                class="form-control form-control-sm"
                style="flex: 1"
                placeholder="Name"
                value=${newName}
                onInput=${(e) => setNewName(e.target.value)}
                onKeyDown=${(e) => e.key === "Enter" && addServer()}
              />
              <input
                class="form-control form-control-sm"
                style="flex: 2"
                placeholder="https://server.com/mcp"
                value=${newUrl}
                onInput=${(e) => setNewUrl(e.target.value)}
                onKeyDown=${(e) => e.key === "Enter" && addServer()}
              />
              <button type="button" class="btn btn-sm btn-secondary" onClick=${(_) => addServer()}>
                <i class="bi bi-plus"></i>
              </button>
            </div>
          <//>
        `;
      }

      function AgentEditorModal(props) {
        let firstInput;
        const [form, setForm] = createStore(createAgentDraft(props.agent));

        createEffect(() => {
          const next = createAgentDraft(props.agent);
          setForm(produce((state) => Object.assign(state, next)));
        });

        const toggleTool = (name) => {
          setForm("tools", (tools) =>
            tools.includes(name) ? tools.filter((tool) => tool !== name) : [...tools, name]
          );
        };

        const setName = (value) => {
          const currentSlug = form.slug;
          const previousAutoSlug = slugify(form.name);
          setForm("name", value);
          if (!currentSlug || currentSlug === previousAutoSlug) setForm("slug", slugify(value));
        };

        const handleSave = () => {
          const name = form.name.trim();
          if (!name) return;
          const slug = slugify(form.slug || name) || `agent-${Date.now()}`;
          const tools = form.tools.filter((tool) => tool !== "task" || form.allowDelegation);
          props.onSave?.({
            ...unwrap(form),
            name,
            slug,
            description: form.description.trim(),
            systemPrompt: form.systemPrompt.trim(),
            tools,
          });
        };

        return html`
          <${ModalFrame}
            title=${() => (form.id ? "Edit Agent" : "New Agent")}
            dialogClass="modal-lg modal-dialog-scrollable"
            onClose=${props.onClose}
            footer=${html`
              <button type="button" class="btn btn-secondary" onClick=${(_) => props.onClose?.()}>
                Cancel
              </button>
              <button type="button" class="btn btn-primary" onClick=${handleSave}>Save</button>
            `}
          >
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label small text-muted" for="agentName">Name</label>
                <input
                  ref=${(el) => {
                    firstInput = el;
                    queueMicrotask(() => {
                      firstInput?.focus();
                      firstInput?.select?.();
                    });
                  }}
                  id="agentName"
                  class="form-control"
                  value=${() => form.name}
                  onInput=${(e) => setName(e.target.value)}

              </div>
              <div class="col-md-6">
                <label class="form-label small text-muted" for="agentSlug">Slug</label>
                <input
                  id="agentSlug"
                  class="form-control"
                  value=${() => form.slug}
                  onInput=${(e) => setForm("slug", e.target.value)}
                />
              </div>
              <div class="col-12">
                <label class="form-label small text-muted" for="agentDescription"
                  >Description</label
                >
                <input
                  id="agentDescription"
                  class="form-control"
                  value=${() => form.description}
                  onInput=${(e) => setForm("description", e.target.value)}
                />
              </div>
              <div class="col-md-6">
                <label class="form-label small text-muted" for="agentDefaultModelId"
                  >Default model</label
                >
                <select
                  id="agentDefaultModelId"
                  class="form-select"
                  value=${() => form.defaultModelId}

                >
                  <${ModelOptions} />
                </select>
              </div>
              <div class="col-md-6">
                <label class="form-label small text-muted d-block">Behavior</label>
                <div class="form-check">
                  <input
                    id="agentVisibleInPicker"
                    class="form-check-input"
                    type="checkbox"
                    checked=${() => !form.hiddenFromPicker}
                    onChange=${(e) => setForm("hiddenFromPicker", !e.target.checked)}
                  />
                  <label class="form-check-label" for="agentVisibleInPicker"
                    >Show in top-level picker</label
                  >
                </div>
                <div class="form-check mt-2">
                  <input
                    id="agentAllowDelegation"
                    class="form-check-input"
                    type="checkbox"
                    checked=${() => form.allowDelegation}
                    onChange=${(e) => {
                      setForm("allowDelegation", e.target.checked);
                      if (!e.target.checked)
                        setForm("tools", (tools) => tools.filter((tool) => tool !== "task"));
                    }}
                  />
                  <label class="form-check-label" for="agentAllowDelegation"
                    >Allow this agent to delegate</label
                  >
                </div>
              </div>
              <div class="col-12">
                <label class="form-label small text-muted d-block">Tools</label>
                <div class="d-flex flex-wrap gap-3">
                  <${For} each=${AGENT_TOOL_NAMES}>
                    ${(tool) => html`
                      <div class="form-check">
                        <input
                          id=${() => `agentTool_${tool}`}
                          class="form-check-input"
                          type="checkbox"
                          checked=${() => form.tools.includes(tool)}
                          disabled=${() => tool === "task" && !form.allowDelegation}
                          onChange=${(_) => toggleTool(tool)}
                        />
                        <label class="form-check-label" for=${() => `agentTool_${tool}`}
                          >${tool}</label
                        >
                      </div>
                    `}
                  <//>
                </div>
              </div>
              <div class="col-12">
                <label class="form-label small text-muted" for="agentSystemPrompt"
                  >System prompt</label
                >
                <textarea
                  id="agentSystemPrompt"
                  class="form-control resize-y"
                  rows="12"
                  value=${() => form.systemPrompt}
                  onInput=${(e) => setForm("systemPrompt", e.target.value)}
                ></textarea>
              </div>
            </div>
          <//>
        `;
      }
