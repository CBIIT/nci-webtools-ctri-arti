        async function testFullToolUseFlow() {
          // Test the full flow: echo client returns tool_use, we verify the format
          // This tests the enhanced echo client can drive tool use

          // 1. First call - echo returns tool use request
          const output1 = await sendEchoMessage({
            text: "I'll check the files",
            toolUse: [{ name: "think", input: { thought: "analyzing the request" } }],
          });
          const blocks1 = await collectBlocks(output1);

          // Verify tool use returned
          const toolStart = blocks1.find((b) => b.contentBlockStart?.start?.toolUse);
          assert(toolStart, "Should have tool use");
          const toolUseId = toolStart.contentBlockStart.start.toolUse.toolUseId;
          assert(toolUseId.startsWith("echo_"), "Tool use ID should be generated by echo client");

          // 2. Simulate tool execution
          const toolResult = think({ thought: "analyzing the request" });
          assert(toolResult === "Thinking complete.", "Tool should execute");

          // 3. Second call with tool result - echo returns final response
          const client = await getConverseClient("echo");
          const output2 = await client.send({
            messages: [
              { role: "user", content: [{ text: JSON.stringify({ text: "Check files" }) }] },
              {
                role: "assistant",
                content: [
                  { text: "I'll check" },
                  { toolUse: { toolUseId, name: "think", input: { thought: "analyzing" } } },
                ],
              },
              {
                role: "user",
                content: [{ toolResult: { toolUseId, content: [{ text: toolResult }] } }],
              },
            ],
          });
          const blocks2 = await collectBlocks(output2);

          // Should get echoed response (tool result message triggers echo)
          const text = blocks2
            .filter((b) => b.contentBlockDelta?.delta?.text)
            .map((b) => b.contentBlockDelta.delta.text)
            .join("");
          assert(text.includes("Echo:"), "Should echo the tool result message");
        }

        async function waitFor(
          predicate,
          { timeout = 3000, interval = 20, message = "Timed out waiting for condition" } = {}
        ) {
          const start = Date.now();
          while (Date.now() - start < timeout) {
            const value = await predicate();
            if (value) return value;
            await sleep(interval);
          }
          throw new Error(message);
        }

        // Test harness: creates an isolated UI and cleans up its thread data
        function createTestUI(options = {}) {
          const container = document.createElement("div");
          container.id = "test-ui-" + Date.now();
          container.style.cssText = "position:absolute;left:-9999px;width:800px;";
          document.body.appendChild(container);
          const previousUrl = window.location.pathname + window.location.search;
          const params = new URLSearchParams(window.location.search);
          params.set("test", "1");
          params.delete("threadId");
          if (options.agentId) params.set("agentId", options.agentId);
          else params.delete("agentId");
          window.history.replaceState({}, "", `${window.location.pathname}?${params}`);

          const dispose = render(() => html`<${App} />`, container);
          let ownedThreadId = null;

          const getMessages = () => Array.from(container.querySelectorAll(".message-block"));
          const lastMessage = () => getMessages().at(-1) || null;
          const getThreadId = () =>
            +new URLSearchParams(window.location.search).get("threadId") || null;
          const getForm = () => container.querySelector("form#inputForm");
          const getAgentSelect = () => container.querySelector("#agentSelect");
          const getConversationTitle = () => container.querySelector("#conversationTitle");
          const setFiles = (input, files = []) => {
            const transfer = new DataTransfer();
            for (const file of files) transfer.items.add(file);
            Object.defineProperty(input, "files", {
              configurable: true,
              get: () => transfer.files,
            });
          };

          async function send(message, { model = "echo", reasoning = false, files = [] } = {}) {
            const form = getForm();
            form.modelId.value = model;
            form.reasoningMode.checked = reasoning;
            form.userMessage.value =
              typeof message === "string" ? message : JSON.stringify(message);
            setFiles(form.userFiles, files);
            const initialCount = getMessages().length;

            form.requestSubmit();
            await waitFor(() => getMessages().length >= initialCount + 2, {
              message: "Expected a user message and assistant reply",
            });
            ownedThreadId ||= getThreadId();
            return { messages: getMessages(), lastMessage, threadId: getThreadId() };
          }

          async function sendWithEnter(message, { model = "echo", reasoning = false } = {}) {
            const form = getForm();
            form.modelId.value = model;
            form.reasoningMode.checked = reasoning;
            form.userMessage.value =
              typeof message === "string" ? message : JSON.stringify(message);
            const initialCount = getMessages().length;

            form.userMessage.dispatchEvent(
              new KeyboardEvent("keydown", { key: "Enter", bubbles: true })
            );
            await waitFor(() => getMessages().length >= initialCount + 2, {
              message: "Expected Enter to submit the form",
            });
            ownedThreadId ||= getThreadId();
            return { messages: getMessages(), lastMessage, threadId: getThreadId() };
          }

            const select = getAgentSelect();
            if (!select) throw new Error("Expected agent picker");
            await waitFor(
              () => Array.from(select.options).some((option) => option.value === String(agentId)),
              { message: `Expected agent ${agentId} in the picker` }
            );
            select.value = String(agentId);
            select.dispatchEvent(new Event("change", { bubbles: true }));
            await waitFor(() => select.value === String(agentId) && getThreadId() === null, {
              message: "Expected agent picker to switch agents",
            });
          }

                for (const resource of resources) await db.delete("resources", resource.id);

          const ui = createTestUI();
          const originalGetClientForModel = getClientForModel;
          const onUnhandledRejection = (event) => {
            if (String(event.reason?.message || event.reason).includes("send failed"))
              event.preventDefault();
          };

          try {
            getClientForModel = async () => {
              throw new Error("send failed");
            };
            window.addEventListener("unhandledrejection", onUnhandledRejection);

            const form = ui.form();
            form.userMessage.value = "keep this draft";
            ui.setFiles(form.userFiles, [new File(["draft"], "draft.txt", { type: "text/plain" })]);
            form.requestSubmit();
            await sleep(50);

            assert(
              form.userMessage.value === "keep this draft",
              "Failed sends should keep the draft text"
            );
            assert(form.userFiles.files.length === 1, "Failed sends should keep attached files");
          } finally {
            getClientForModel = originalGetClientForModel;
            window.removeEventListener("unhandledrejection", onUnhandledRejection);
            await ui.cleanup();
          }
        }

        async function storyEditingAQuestionKeepsItsAttachment() {
          const ui = createTestUI();

            const latestUser = messages
              .filter((m) => m.role === "user")
              .sort((a, b) => a.createdAt - b.createdAt)

            const doc = latestUser?.content?.find((block) => block.document);

              "Edited branch should store new text"

          } finally {

              .filter((m) => m.role === "user")

            const doc = latestUser?.content?.find((block) => block.document);

            assert(

            );
          } finally {
            await ui.cleanup();
          }
        }

        async function storyGeminiCanRequestTwoToolsInOneChunk() {
          const output = await getGeminiClient({
            models: {
              generateContentStream: async function* () {
                yield {
                  candidates: [
                    {
                      content: {
                        parts: [
                          {
                            functionCall: { name: "editor", args: { command: "view", path: "/" } },
                          },
                          {
                            functionCall: { name: "think", args: { thought: "check the result" } },
                          },
                        ],
                      },
                      finishReason: "STOP",
                    },
                  ],
                };
              },
            },
          }).send({ modelId: GEMINI_FLASH_LITE_MODEL_ID, messages: [], toolConfig: { tools: [] } });

          const blocks = await collectBlocks(output);
          const toolStarts = blocks.filter((block) => block.contentBlockStart?.start?.toolUse);
          assert(toolStarts.length === 2, "Gemini should emit two tool calls as two blocks");
          assert(
            toolStarts[0].contentBlockStart.start.toolUse.name === "editor",
            "First tool should stay intact"
          );
          assert(
            toolStarts[1].contentBlockStart.start.toolUse.name === "think",
            "Second tool should stay intact"
          );
        }

              "event: done",
              'data: {"jsonrpc":"2.0","result":{"done":true}}',
            ].join("\n")
          );

          assert(events.length === 2, "SSE parser should return both events");
          assert(
            events[0] === '{"jsonrpc":"2.0",\n"result":{"ok":true}}',
            "SSE parser should join multiline payloads"
