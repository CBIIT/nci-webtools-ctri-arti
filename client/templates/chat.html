              class="form-control"
              value=${title}
              onInput=${(e) => setTitle(e.target.value)}
              onKeyDown=${(e) => {
                if (e.key === "Enter") props.onSave?.(title().trim() || "Untitled");
              }}
            />
          <//>
        `;
      }

      // #endregion

      // #region 10. SUMMARIES & CONTEXT
      // =============================================================================
      // Conversation summaries, token estimates, and context compression.
      // =============================================================================

      function isConversationSummaryText(text = "") {
        return typeof text === "string" && text.startsWith(CONVERSATION_SUMMARY_TOKEN);
      }

      function isConversationSummaryMessage(message) {
        return (
          message?.role === "user" &&
          message?.content?.some?.((c) => isConversationSummaryText(c.text))
        );
      }

      function getConversationSummaryBody(text = "") {
        return isConversationSummaryText(text)
          ? text.slice(CONVERSATION_SUMMARY_TOKEN.length).replace(/^\s+/, "")
          : text;
      }

      function getModelMaxContext(modelId) {
        return MODEL_MAX_CONTEXT[modelId] || null;
      }

      function estimateMessageTokens(messages) {
        let tokens = 0;
        for (const msg of messages || []) {
          for (const c of msg.content || []) {
            if (c.text) tokens += Math.ceil(c.text.length / 8);
            if (c.document?.source?.text) tokens += Math.ceil(c.document.source.text.length / 8);
            if (c.document?.source?.bytes) tokens += Math.ceil(c.document.source.bytes.length / 3);
            if (c.image?.source?.bytes) tokens += Math.ceil(c.image.source.bytes.length / 3);
            if (c.toolUse) tokens += Math.ceil(JSON.stringify(c.toolUse).length / 8);
            if (c.toolResult) tokens += Math.ceil(JSON.stringify(c.toolResult).length / 8);
          }
        }
        return tokens;
      }

      function getMessageText(message) {
        return (message?.content || [])
          .filter((c) => c.text)
          .map((c) => c.text)
          .join("\n");
      }

      function getSummaryStartIndex(messages, summaryMessageId) {
        if (!summaryMessageId) return -1;
        return messages.findIndex(
          (m) => m.id === summaryMessageId && isConversationSummaryMessage(m)
        );
      }

      function getCompressedMessages(messages, summaryMessageId) {
        const summaryIndex = getSummaryStartIndex(messages, summaryMessageId);
        return summaryIndex >= 0 ? messages.slice(summaryIndex) : messages;
      }

      function withSummaryCachePoint(messages, summaryMessageId) {
        return (messages || []).map((message) => {
          const shouldCache =
            message.id === summaryMessageId || isConversationSummaryMessage(message);
          if (!shouldCache) return { role: message.role, content: message.content };
          const content = [...(message.content || [])];
          if (!content.some((block) => block.cachePoint))
            content.push({ cachePoint: { type: "default" } });
          return { role: message.role, content };
        });
      }

      function getSummaryPrompt(userText = "") {
        return (
          "Summarize the entire conversation so far. Include all key decisions, " +
          "requirements, code, facts, and context needed to continue without the " +
          "original messages. Be thorough but concise. Format as structured notes.\n\n" +
          `Begin your response with exactly "${CONVERSATION_SUMMARY_TOKEN}" on its own line, ` +
          "followed by a blank line.\n\n" +
          "If there are uploaded files or resources referenced in the conversation, " +
          "include a section listing them and note that the editor tool can be used " +
          "to read their contents if needed.\n\n" +
          "End the summary with the user's latest message quoted verbatim, and an " +
          "instruction for the assistant to continue answering it:\n\n" +
          "## Latest User Message\n> " +
          userText +
          "\n\n" +
          "Continue addressing this message in your next response."
        );
      }

      async function summarizeBranchIfNeeded(store, setStore, client, lastMessageId, params, db) {
        const maxContext = getModelMaxContext(store.modelId);
        if (!maxContext) return lastMessageId;

        const relevantMessages = getCompressedMessages(
          store.messages,
          store.thread.summaryMessageId
        );
        if (estimateMessageTokens(relevantMessages) < maxContext * 0.8) return lastMessageId;

        const latestUserText = getMessageText(store.messages.at(-1));
        const summaryPrompt = getSummaryPrompt(latestUserText);
        const summaryInput = getConverseCommand({
          ...store,
          messages: [...relevantMessages, { role: "user", content: [{ text: summaryPrompt }] }],
        });
        const { assistantMsg, stopReason } = await runStreamingTurn({
          client,
          input: summaryInput,
        });

        if (stopReason === "tool_use") return lastMessageId;

        const summaryText = assistantMsg.content
          .filter((block) => block.text)
          .map((block) => block.text)
          .join("");
        if (!isConversationSummaryText(summaryText) || summaryText.length < 50)
          return lastMessageId;

        const summaryMessage = {
          role: "user",
          content: [{ text: summaryText }],
          parentId: lastMessageId,
          createdAt: Date.now(),
        };
        const savedSummaryId = await db.add("messages", {
          ...summaryMessage,
          agentId: params.agentId,
          threadId: params.threadId,
        });
        summaryMessage.id = savedSummaryId;

        const thread = await db.get("threads", params.threadId);
        if (thread) {
          await db.put("threads", { ...thread, summaryMessageId: savedSummaryId });
        }

        setStore("messages", store.messages.length, summaryMessage);
        setStore("thread", "summaryMessageId", savedSummaryId);
        setStore("activeLeafId", savedSummaryId);

        return savedSummaryId;
      }

      // #endregion

      // #region 11. AGENT LOOP & STREAMING
      // =============================================================================
      // Main chat loop, command construction, and stream chunk processing.
      // Surface: takes agent state + client, persists assistant/tool turns, updates tree.
      // =============================================================================

      async function runAgentWithBranching(store, setStore, client, lastMessageId, params, db) {
        const saveMsg = (msg) =>
          db.add("messages", {
            ...unwrap(msg),
            agentId: params.agentId,
            threadId: params.threadId,
          });
        const toolHandlers = getToolHandlers(store.tools);
        const toolContext = {
          db,
          threadId: params.threadId,
          agentId: params.agentId,
          modelId: store.modelId,
        };
        let parentId = await summarizeBranchIfNeeded(
          store,
          setStore,
          client,
          lastMessageId,
          params,
          db
        );

        async function streamAssistantTurn(parentId) {
          const input = getConverseCommand({
            ...store,
            messages: getCompressedMessages(store.messages, store.thread.summaryMessageId),
          });
          const assistantIndex = store.messages.length;
          const assistantMsg = { role: "assistant", content: [], parentId, createdAt: Date.now() };
          setStore("messages", assistantIndex, assistantMsg);

          const { toolResults } = await runStreamingTurn({
            client,
            input,
            assistantMsg,
            toolHandlers,
            toolContext,
            onChunk: (_, currentAssistant) => {
              setStore(
                "messages",
                assistantIndex,
                "content",
                structuredClone(currentAssistant.content)
              );
            },
          });

          return { assistantIndex, assistantMsg, toolResults };
        }

        async function saveAssistantTurn(assistantIndex, assistantMsg) {
          const savedId = await saveMsg(assistantMsg);
          setStore("messages", assistantIndex, "id", savedId);
          setStore("activeLeafId", savedId);
          return savedId;
        }

        async function saveToolResultsTurn(toolResults, parentId) {
          const toolIndex = store.messages.length;
          const toolMessage = { ...toolResults, parentId, createdAt: Date.now() };
          setStore("messages", toolIndex, toolMessage);
          const savedId = await saveMsg(toolMessage);
          setStore("messages", toolIndex, "id", savedId);
          return savedId;
        }

        async function rebuildVisibleThreadState() {
          const history = await db.getAllFromIndex("messages", "threadId", params.threadId);
          setStore(buildThreadState(history, store.thread, params.threadId));
        }

        while (true) {
          const turn = await streamAssistantTurn(parentId);
          parentId = await saveAssistantTurn(turn.assistantIndex, turn.assistantMsg);
          if (!turn.toolResults) break;
          parentId = await saveToolResultsTurn(turn.toolResults, parentId);
        }

        await rebuildVisibleThreadState();
      }

      function getConverseCommand(config) {
        const cachePoint = { type: "default" };
        const additionalModelRequestFields = {};
        if (config.reasoningMode) {
          additionalModelRequestFields.thinking = getThinkingConfig(config.modelId);
        }
        const tools = getProviderToolSpecs(config.tools);
        const messages = withSummaryCachePoint(
          config.messages,
          config.summaryMessageId ?? config.thread?.summaryMessageId
        );

        return {
          modelId: config.modelId,
          messages,
          system: [{ text: config.systemPrompt }, { cachePoint }],
          toolConfig: { tools: [...tools, { cachePoint }] },
          additionalModelRequestFields,
        };
      }

      function processStreamChunk(content, message) {
        const { contentBlockStart, contentBlockDelta, contentBlockStop } = message;

        if (contentBlockStart?.start?.toolUse) {
          content[contentBlockStart.contentBlockIndex] = {
            toolUse: contentBlockStart.start.toolUse,
          };
          return;
        }
        if (contentBlockStop) {
          const block = content[contentBlockStop.contentBlockIndex];
          if (block?.toolUse) block.toolUse.input = parseJSON(block.toolUse.input);
          return;
        }
        if (!contentBlockDelta) return;

        const { contentBlockIndex, delta } = contentBlockDelta;
        content[contentBlockIndex] ||= {};
        const block = content[contentBlockIndex];

        if (delta.reasoningContent) appendReasoning(block, delta.reasoningContent);
        else if (delta.text != null) block.text = (block.text || "") + delta.text;
        else if (delta.toolUse)
          block.toolUse.input = (block.toolUse.input || "") + delta.toolUse.input;
      }

      function appendReasoning(block, rc) {
        block.reasoningContent ||= { reasoningText: {} };
        const t = block.reasoningContent;
        if (rc.text) t.reasoningText.text = (t.reasoningText.text || "") + rc.text;
        if (rc.signature)
          t.reasoningText.signature = (t.reasoningText.signature || "") + rc.signature;
        if (rc.redactedContent) t.redactedContent = (t.redactedContent || "") + rc.redactedContent;
        if (rc.provider) t.provider = rc.provider;
      }

      /** @returns {Promise<StreamingTurnResult>} */
      async function runStreamingTurn({
        client,
        input,
        assistantMsg = { role: "assistant", content: [], createdAt: Date.now() },
        toolHandlers = {},
        toolContext = {},
        onChunk,
      }) {
        const output = await client.send(input);
        const hasToolHandlers = Object.keys(toolHandlers).length > 0;
        let stopReason = null;

        for await (const msg of output.stream) {
          processStreamChunk(assistantMsg.content, msg);
          if (msg.messageStop) stopReason = msg.messageStop.stopReason;
          onChunk?.(msg, assistantMsg);
        }

        const toolResults =
          stopReason === "tool_use" && hasToolHandlers
            ? await getToolResults(assistantMsg.content, toolHandlers, toolContext)
            : null;

        return { assistantMsg, stopReason, toolResults };
      }

      // #endregion

      // #region 12. PROVIDERS
      // =============================================================================
      // AI provider clients (AWS Bedrock, Google Gemini) and configuration.
      // =============================================================================

      async function getConverseClient(type = "aws") {
        if (type === "aws") {
          const config = await withStorage(getAwsConfig, localStorage, "aws-config");
          const client = new BedrockRuntimeClient(config);
          const send = (input) => client.send(new ConverseStreamCommand(input));
          return { client, send };
        }
        if (type === "google") {
          const config = await withStorage(getGoogleConfig, localStorage, "google-config");
          return getGeminiClient(new GoogleGenAI(config));
        }
        if (type === "echo") {
          return getEchoClient();
        }
      }

      // Echo client for testing - interprets JSON instructions from user messages
      // JSON format: { text?: string, toolUse?: [{name, input}], reasoning?: string }
      // Non-JSON text is echoed as before: "Echo: received \"...\""
      function getEchoClient() {
        async function* stream(input) {
          yield { messageStart: { role: "assistant" } };

          // Extract last user message text
          const lastUserMsg = input.messages?.filter((m) => m.role === "user").pop();
          const userText = lastUserMsg?.content?.find((c) => c.text)?.text || "";

          // Try to parse as JSON instruction
          let instruction;
          try {
            instruction = JSON.parse(userText);
            if (typeof instruction !== "object" || instruction === null) throw new Error();
          } catch {
            // Not JSON or invalid - echo as before
            instruction = {
              text: `Echo: received "${userText.slice(0, 100)}${userText.length > 100 ? "..." : ""}"`,
            };
          }

          let blockIndex = 0;

          // Handle reasoning content (for extended thinking tests)
          if (instruction.reasoning) {
            yield {
              contentBlockStart: { contentBlockIndex: blockIndex, start: { reasoningContent: {} } },
            };
            yield {
              contentBlockDelta: {
                contentBlockIndex: blockIndex,
                delta: { reasoningContent: { text: instruction.reasoning } },
              },
            };
            yield { contentBlockStop: { contentBlockIndex: blockIndex } };
            blockIndex++;
          }

          // Handle text response
          if (instruction.text) {
            yield { contentBlockStart: { contentBlockIndex: blockIndex, start: {} } };
            yield {
              contentBlockDelta: {
                contentBlockIndex: blockIndex,
                delta: { text: instruction.text },
              },
            };
            yield { contentBlockStop: { contentBlockIndex: blockIndex } };
            blockIndex++;
          }

          // Handle tool use
          if (instruction.toolUse?.length) {
            for (const tool of instruction.toolUse) {
              const toolUseId = `echo_${Date.now()}_${blockIndex}`;
              yield {
                contentBlockStart: {
                  contentBlockIndex: blockIndex,
                  start: { toolUse: { toolUseId, name: tool.name } },
                },
              };
              yield {
                contentBlockDelta: {
                  contentBlockIndex: blockIndex,
                  delta: { toolUse: { input: JSON.stringify(tool.input || {}) } },
                },
              };
              yield { contentBlockStop: { contentBlockIndex: blockIndex } };
              blockIndex++;
            }
          }

          // Determine stop reason
          const hasToolUse = instruction.toolUse?.length > 0;
          yield { messageStop: { stopReason: hasToolUse ? "tool_use" : "end_turn" } };
        }

        return { send: (input) => Promise.resolve({ stream: stream(input) }) };
      }

      export function getGeminiClient(client) {
        const toB64 = (b) => btoa(b.reduce((s, x) => s + String.fromCharCode(x), ""));
        const MIME = {
          png: "image/png",
          jpeg: "image/jpeg",
          jpg: "image/jpeg",
          gif: "image/gif",
          webp: "image/webp",
          pdf: "application/pdf",
        };

        async function* stream(input) {
          const toolNames = new Map();
          const toGeminiPart = (b) => {
            if (b.text) return { text: b.text };
            if (b.image)
              return {
                inlineData: { data: toB64(b.image.source.bytes), mimeType: MIME[b.image.format] },
              };
            if (b.document)
              return {
                inlineData: {
                  data: toB64(b.document.source.bytes),
                  mimeType: MIME[b.document.format] || "application/octet-stream",
                },
              };
            if (b.toolUse) {
              toolNames.set(b.toolUse.toolUseId, b.toolUse.name);
              return {
                functionCall: {
                  name: b.toolUse.name,
                  args:
                    typeof b.toolUse.input === "string"
                      ? JSON.parse(b.toolUse.input)
                      : b.toolUse.input,
                  id: b.toolUse.toolUseId,
                },
              };
            }
            if (b.toolResult) {
              const c = b.toolResult.content?.[0];
              return {
                functionResponse: {
                  id: b.toolResult.toolUseId,
                  name: toolNames.get(b.toolResult.toolUseId) || b.toolResult.toolUseId,
                  response: c?.json ?? { output: c?.text },
                },
              };
            }
          };
          const toGeminiParts = (content = []) => {
            const parts = [];
            let pendingSignature = null;
            const flushPendingSignature = () => {
              if (!pendingSignature) return;
              parts.push({ text: "", thought: true, thoughtSignature: pendingSignature });
              pendingSignature = null;
            };
            for (const b of content) {
              if (b.reasoningContent) {
                const reasoningText = b.reasoningContent.reasoningText || {};
                const text = reasoningText.text || "";
                const signature = reasoningText.signature;
                if (b.reasoningContent.provider !== "google") continue;
                if (!text && !b.reasoningContent.redactedContent && signature) {
                  pendingSignature = signature;
                  continue;
                }
                flushPendingSignature();
                parts.push({
                  text,
                  thought: true,
                  ...(signature ? { thoughtSignature: signature } : {}),
                });
                continue;
              }
              const part = toGeminiPart(b);
              if (!part) continue;
              if (pendingSignature) {
                part.thoughtSignature = pendingSignature;
                pendingSignature = null;
              }
              parts.push(part);
            }
            flushPendingSignature();
            return parts;
          };
          const tools = input.toolConfig?.tools
            ?.filter((t) => t.toolSpec)
            .map((t) => ({
              functionDeclarations: [
                {
                  name: t.toolSpec.name,
                  description: t.toolSpec.description,
                  parametersJsonSchema: t.toolSpec.inputSchema?.json,
                },
              ],
            }));
          const toolChoice = input.toolConfig?.toolChoice;
          const functionCallingConfig = toolChoice?.any
            ? { mode: "ANY" }
            : toolChoice?.tool?.name
              ? { mode: "ANY", allowedFunctionNames: [toolChoice.tool.name] }
              : toolChoice?.auto
                ? { mode: "AUTO" }
                : null;

          const geminiReq = {
            model: input.modelId,
            contents: input.messages.map((m) => ({
              role: m.role === "assistant" ? "model" : "user",
              parts: toGeminiParts(m.content),
            })),
            config: {
              systemInstruction: input.system?.find((s) => s.text)?.text,
              ...(tools?.length ? { tools } : {}),
              ...(functionCallingConfig ? { toolConfig: { functionCallingConfig } } : {}),
              ...(input.additionalModelRequestFields?.thinking && {
                thinkingConfig: {
                  thinkingBudget: input.additionalModelRequestFields.thinking.budget_tokens,
                },
              }),
            },
          };

          const response = await client.models.generateContentStream(geminiReq);
          yield { messageStart: { role: "assistant" } };

          let idx = 0,
            active = null,
            toolNum = 0,
            sawToolUse = false;

          for await (const chunk of response) {
            const parts = chunk.candidates?.[0]?.content?.parts ?? [];
            const done = chunk.candidates?.[0]?.finishReason;
            if (chunk.promptFeedback?.blockReason) {
              if (active) yield { contentBlockStop: { contentBlockIndex: idx } };
              yield { messageStop: { stopReason: "guardrail_intervened" } };
              return;
            }

            for (const p of parts) {
              let type, start, delta;
              if (p.thoughtSignature && !p.thought) {
                if (active) yield { contentBlockStop: { contentBlockIndex: idx++ } };
                yield {
                  contentBlockDelta: {
                    contentBlockIndex: idx,
                    delta: {
                      reasoningContent: { signature: p.thoughtSignature, provider: "google" },
                    },
                  },
                };
                yield { contentBlockStop: { contentBlockIndex: idx } };
                idx++;
              }

              if (p.thought && (p.text != null || p.thoughtSignature)) {
                type = "reasoning";
                delta = {
                  reasoningContent: {
                    provider: "google",
                    ...(p.text != null ? { text: p.text } : {}),
                    ...(p.thoughtSignature && { signature: p.thoughtSignature }),
                  },
                };
              } else if (p.text != null) {
                if (p.text === "" && p.thoughtSignature) continue;
                type = "text";
                delta = { text: p.text };
              } else if (p.functionCall) {
                sawToolUse = true;
                if (active) {
                  yield { contentBlockStop: { contentBlockIndex: idx } };
                  idx++;
                  active = null;
                }
                const id = p.functionCall.id || `gemini_${toolNum++}`;
                yield {
                  contentBlockStart: {
                    contentBlockIndex: idx,
                    start: { toolUse: { toolUseId: id, name: p.functionCall.name } },
                  },
                };
                yield {
                  contentBlockDelta: {
                    contentBlockIndex: idx,
                    delta: { toolUse: { input: JSON.stringify(p.functionCall.args ?? {}) } },
                  },
                };
                yield { contentBlockStop: { contentBlockIndex: idx } };
                idx++;
                continue;
              } else continue;

              if (type !== active) {
                if (active) yield { contentBlockStop: { contentBlockIndex: idx++ } };
                if (start) yield { contentBlockStart: { contentBlockIndex: idx, start } };
                active = type;
              }
              yield { contentBlockDelta: { contentBlockIndex: idx, delta } };
            }

            if (done) {
              if (active) yield { contentBlockStop: { contentBlockIndex: idx } };
              const stopReason =
                sawToolUse && done === "STOP"
                  ? "tool_use"
                  : done === "MAX_TOKENS"
                    ? "max_tokens"
                    : ["SAFETY", "RECITATION", "LANGUAGE", "BLOCKLIST"].includes(done)
                      ? "content_filtered"
                      : "end_turn";
              yield { messageStop: { stopReason } };
            }
          }
        }

        return { client, send: (input) => Promise.resolve({ stream: stream(input) }) };
      }

      async function withStorage(getConfig, storage, key) {
        const cached = storage.getItem(key);
        if (cached) return JSON.parse(cached);
        const config = await getConfig();
        storage.setItem(key, JSON.stringify(config));
        return config;
      }

      function getGoogleConfig(prompt = window.prompt) {
        const apiKey = prompt("Gemini API Key:");
        return { apiKey };
      }

      function getAwsConfig(prompt = window.prompt) {
        const region = prompt("AWS region [us-east-1]:");
        const accessKeyId = prompt("AWS Access Key ID:");
        const secretAccessKey = prompt("AWS Secret Access Key:");
        const sessionToken = prompt("AWS Session Token [optional]:");
        return {
          region: region || "us-east-1",
          credentials: { accessKeyId, secretAccessKey, sessionToken: sessionToken || undefined },
        };
      }

      // #endregion

      const runtimeState = {
        proxyConfig: null,
        mcpSessions: new Map(),
      };
      const mcpSessions = runtimeState.mcpSessions;

      function getProxyConfig() {
        return runtimeState.proxyConfig;
      }

      function setProxyConfig(config) {
        runtimeState.proxyConfig = config;
      }

      function syncRuntimeState(agentRecord) {
        setProxyConfig(agentRecord?.proxyConfig || null);
      }

      function getMcpSessionKey(agentId, url) {
        return `${+agentId || 1}:${url}`;
      }

      function clearMcpSessions(agentId = null) {
        if (agentId == null) {
          mcpSessions.clear();
          return;
        }
        const prefix = `${+agentId || 1}:`;
        for (const key of [...mcpSessions.keys()]) {
          if (key.startsWith(prefix)) mcpSessions.delete(key);
        }
      }

      // Proxied fetch for non-localhost URLs
      async function proxyFetch(url, options = {}) {
        const proxy = getProxyConfig();
        const urlObj = new URL(url, window.location.origin);
        const isLocalhost = ["localhost", "127.0.0.1", "[::1]"].some(
          (h) => urlObj.hostname === h || urlObj.hostname.endsWith(".localhost")
        );

        if (!proxy?.endpoint || isLocalhost) {
          return fetch(url, options);
        }

        // Construct proxied URL: proxy endpoint + target URL
        const targetUrl = urlObj.href;
        const proxyUrl = proxy.endpoint.replace(/\/+$/, "") + "/" + targetUrl;

        // Add proxy auth header
        const headers = new Headers(options.headers || {});
        if (proxy.headerName && proxy.headerValue) {
          headers.set(proxy.headerName, proxy.headerValue);
        }

        return fetch(proxyUrl, { ...options, headers });
      }

      // #region 13. TOOL: CODE
      // =============================================================================
      // Sandboxed code execution and HTML preview bridging.
      // =============================================================================

      async function code({ language, source, filename, timeout = 5000 }, context = {}) {
        // If filename provided, load from resources
        if (filename && context.db) {
          const file = await getVisibleResource(context.db, filename, context);
          if (!file) return { error: `File not found: ${filename}`, logs: [] };
          source = file.content;
          if (!language) {
            const ext = filename.split(".").pop()?.toLowerCase();
            language = ext === "html" ? "html" : "js";
          }
        }
        language = language || "js";

        return new Promise((resolve) => {
          const logs = [];
          const frame = document.createElement("iframe");
          const token = createBridgeToken();
          frame.style.cssText =
            "position:absolute;left:-9999px;top:-9999px;width:0;height:0;border:0";
          frame.sandbox = "allow-scripts";
          document.body.appendChild(frame);
          let cleanupBridge = null;

          const cleanup = () => {
            clearTimeout(kill);
            cleanupBridge?.();
            frame.remove();
            resolve({ logs, source });
          };

          const kill = setTimeout(cleanup, timeout);
          cleanupBridge = loadSandboxFrame(
            frame,
            token,
            buildCodeDoc(token, source || "", language),
            async (message, port) => {
              if (message.type === "log") logs.push(String(message.msg));
              if (message.type === "done") cleanup();
              if (message.type === "resources") {
                const { id, command, args } = message;
                try {
                  const result = await editor(
                    { command, ...args },
                    { db: context.db, threadId: context.threadId, agentId: context.agentId }
                  );
                  port.postMessage({ token, id, result });
                } catch (error) {
                  port.postMessage({ token, id, error: error.message });
                }
              }
            }
          );
        });
      }

      function think(input) {
        return "Thinking complete.";
      }

      // #endregion

      // #region 14. TOOL: EDITOR
      // =============================================================================
      // Virtual file operations against the resources store.
      // =============================================================================

      async function editor(
        { command, path, view_range, old_str, new_str, file_text, insert_line, new_path },
        context = {}
      ) {
        const { db, threadId, agentId } = context;
        if (!db) return "Error: Database not available";

        const normPath = normalizeResourcePath(path);
        const isDir = path.endsWith("/");

        switch (command) {
          case "view": {
            const resources = await getVisibleResources(db, { threadId, agentId });
            const file = resources.find((r) => r.path === normPath);
            if (file && !isDir)
              return { status: "viewed", path, content: getTextView(file.content, view_range) };

            // List as directory (with or without trailing slash)
            const prefix = normPath ? normPath + "/" : "";
            const entries = new Set();
            for (const r of resources) {
              if (r.path.startsWith(prefix)) {
                const rest = r.path.slice(prefix.length);
                const first = rest.split("/")[0];
                if (first) entries.add(rest.includes("/") ? first + "/" : first);
              }
            }
            if (entries.size > 0)
              return {
                status: "directory",
                path: prefix || "/",
                entries: Array.from(entries).sort(),
              };
            return { status: "error", error: `Not found: ${path}` };
          }

          case "create": {
            if (!file_text && file_text !== "")
              return { status: "error", error: "file_text is required for create" };
            const existing = await getVisibleResource(db, normPath, { threadId, agentId });
            if (existing)
              return {
                status: "error",
                error: `File already exists: ${path}. Use str_replace to edit.`,
              };
            await saveResourceContent(db, normPath, file_text, { threadId, agentId });
            return { status: "created", path, content: file_text };
          }

          case "str_replace": {
            if (!old_str) return { status: "error", error: "old_str is required for str_replace" };
            if (new_str === undefined)
              return { status: "error", error: "new_str is required for str_replace" };
            const resource = await getVisibleResource(db, normPath, { threadId, agentId });
            if (!resource) return { status: "error", error: `File not found: ${path}` };
            const escaped = old_str.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
            const count = (resource.content.match(new RegExp(escaped, "g")) || []).length;
            if (count === 0) return { status: "error", error: "old_str not found in file" };
            if (count > 1)
              return {
                status: "error",
                error: `old_str appears ${count} times. Be more specific.`,
              };
            const newContent = resource.content.replace(old_str, new_str);
            await saveResourceContent(db, normPath, newContent, { threadId, agentId });
            return { status: "replaced", path, content: newContent };
          }

          case "insert": {
            if (insert_line === undefined)
              return { status: "error", error: "insert_line is required for insert" };
            if (!new_str && new_str !== "")
              return { status: "error", error: "new_str is required for insert" };
            const resource = await getVisibleResource(db, normPath, { threadId, agentId });
            if (!resource) return { status: "error", error: `File not found: ${path}` };
            const lines = resource.content.split("\n");
            const idx = Math.max(0, Math.min(lines.length, insert_line));
            lines.splice(idx, 0, new_str);
            const newContent = lines.join("\n");
            await saveResourceContent(db, normPath, newContent, { threadId, agentId });
            return { status: "inserted", path, content: newContent };
          }

          case "delete": {
            const resource = await getVisibleResource(db, normPath, { threadId, agentId });
            if (!resource) return { status: "error", error: `Path not found: ${path}` };
            await db.delete("resources", resource.id);
            return { status: "deleted", path };
          }

          case "rename": {
            if (!new_path) return { status: "error", error: "new_path is required for rename" };
            const resource = await getVisibleResource(db, normPath, { threadId, agentId });
            if (!resource) return { status: "error", error: `Path not found: ${path}` };
            const newNormPath = normalizeResourcePath(new_path);
            const existing = await getVisibleResource(db, newNormPath, { threadId, agentId });
            if (existing)
              return { status: "error", error: `Destination already exists: ${new_path}` };
            await db.put("resources", { ...resource, path: newNormPath, updatedAt: Date.now() });
            return { status: "renamed", old_path: path, new_path };
          }

          default:
            return { status: "error", error: `Unknown command: ${command}` };
        }
      }

      // #endregion

      // #region 15. TOOL: MCP
      // =============================================================================
      // MCP server requests, sessions, and resource helpers.
      // =============================================================================

      async function mcp({ command, server, tool, uri, name, args, filename }, context = {}) {
        const { db, agentId, threadId } = context;
        if (!db) return { error: "Database not available" };

        const servers = (await db.get("agents", agentId || 1))?.mcpServers || [];

        if (command === "list_servers") {
          return {
            servers: servers.map((s) => ({
              name: s.name,
              url: s.url,
              enabled: s.enabled !== false,
            })),
          };
        }

        const cfg = servers.find((s) => s.name === server && s.enabled !== false);
        if (!cfg) return { error: server ? `Server not found: ${server}` : "Server name required" };
        const sessionKey = getMcpSessionKey(agentId || 1, cfg.url);

        const send = async (method, params = {}) => {
          const s = mcpSessions.get(sessionKey) || { id: null, seq: 0 };
          const res = await proxyFetch(cfg.url, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json, text/event-stream",
              ...(s.id && { "Mcp-Session-Id": s.id }),
            },
            body: JSON.stringify({ jsonrpc: "2.0", id: ++s.seq, method, params }),
          });
          s.id = res.headers.get("Mcp-Session-Id") || s.id;
          mcpSessions.set(sessionKey, s);

          if (!res.ok) throw new Error(`MCP ${res.status}: ${(await res.text()).slice(0, 500)}`);
          if (res.status === 202 || res.status === 204) return null;

          const text = await res.text();
          if (!text?.trim()) return null;

          // Parse SSE or JSON - join multiline data frames before parsing
          const isSSE = (res.headers.get("Content-Type") || "").includes("text/event-stream");
          const payloads = isSSE ? extractSSEDataEvents(text) : [text];
          let jsonStr = null;
          for (let i = payloads.length - 1; i >= 0; i--) {
            try {
              JSON.parse(payloads[i]);
              jsonStr = payloads[i];
              break;
            } catch {
              /* keep scanning */
            }
          }

          if (!jsonStr) return null;
          const { result, error } = JSON.parse(jsonStr);
          if (error) throw new Error(error.message);
          return result;
        };

        try {
          if (!mcpSessions.has(sessionKey)) {
            mcpSessions.set(sessionKey, { id: null, seq: 0 });
            await send("initialize", {
              protocolVersion: "2024-11-05",
              capabilities: {},
              clientInfo: { name: "chat-html", version: "1.0.0" },
            });
            await send("notifications/initialized", {});
          }

          const methods = {
            list_tools: () => send("tools/list"),
            call_tool: () => send("tools/call", { name: tool, arguments: args || {} }),
            list_resources: () => send("resources/list"),
            read_resource: () => send("resources/read", { uri }),
            list_prompts: () => send("prompts/list"),
            get_prompt: () => send("prompts/get", { name, arguments: args || {} }),
          };

          const fn = methods[command];
          if (!fn) return { error: `Unknown command: ${command}` };

          const result = { server, ...(await fn()) };

          // Save to file if filename provided
          if (filename && !result.error) {
            // Parse JSON text fields to avoid double-encoding
            const parsed = JSON.parse(JSON.stringify(result), (k, v) => {
              if (typeof v === "string" && (v.startsWith("{") || v.startsWith("["))) {
                try {
                  return JSON.parse(v);
                } catch {
                  return v;
                }
              }
              return v;
            });
            const content = JSON.stringify(parsed, null, 2);
            await saveResourceContent(db, filename, content, {
              threadId,
              agentId,
              scope: "thread",
            });
            result.saved = filename;
          }

          return result;
        } catch (e) {
          return { error: e.message };
        }
      }

      // #endregion

      // #region 16. TOOL: TASK
      // =============================================================================
      // Delegation to other agents with depth, turn, and cycle guardrails.
      // Surface: validates policy in task(), executes the delegated run in runDelegatedTask().
      // =============================================================================

      function escapeXml(text = "") {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&apos;");
      }

      function normalizeTaskContextMessage(message = {}) {
        const text = typeof message.text === "string" ? message.text : getMessageText(message);
        if (!text) return null;
        return { role: message.role || "user", text };
      }

      function normalizeTaskContextFile(file = {}) {
        if (!file?.path) return null;
        if (file.content == null) return { path: normalizeResourcePath(file.path) };
        return { path: normalizeResourcePath(file.path), content: String(file.content) };
      }

      function normalizeTaskContextPacket(taskContext = null) {
        if (!taskContext) return null;

        const packet = {};
        if (taskContext.summary) packet.summary = String(taskContext.summary);
        if (Array.isArray(taskContext.messageIds) && taskContext.messageIds.length) {
          packet.messageIds = taskContext.messageIds.map((id) => +id).filter(Boolean);
        }
        if (Array.isArray(taskContext.messages)) {
          const messages = taskContext.messages.map(normalizeTaskContextMessage).filter(Boolean);
          if (messages.length) packet.messages = messages;
        }
        if (Array.isArray(taskContext.files)) {
          const files = taskContext.files
            .map((file) =>
              typeof file === "string"
                ? { path: normalizeResourcePath(file) }
                : normalizeTaskContextFile(file)
            )
            .filter(Boolean);
          if (files.length) packet.files = files;
        }

        return Object.keys(packet).length ? packet : null;
      }

      /** @returns {Promise<TaskContextPacket|null|{ error: string }>} */
      async function expandTaskContextPacket(taskContext, runtimeContext = {}) {
        if (!taskContext) return null;

        const packet = {};
        if (taskContext.summary) packet.summary = taskContext.summary;

        const messages = [...(taskContext.messages || [])];
        if (taskContext.messageIds?.length) {
          if (!runtimeContext.db || !runtimeContext.threadId) {
            return { error: "Cannot expand context.messageIds without a parent thread." };
          }

          const threadMessages = await runtimeContext.db.getAllFromIndex(
            "messages",
            "threadId",
            runtimeContext.threadId
          );
          const messagesById = new Map(threadMessages.map((message) => [message.id, message]));
          for (const id of taskContext.messageIds) {
            const message = messagesById.get(+id);
            const normalized = normalizeTaskContextMessage(message);
            if (!message || !normalized) return { error: `Context message not found: ${id}` };
            messages.push(normalized);
          }
        }
        if (messages.length) packet.messages = messages;

        const files = [];
        for (const file of taskContext.files || []) {
          if (file.content != null) {
            files.push({ path: file.path, content: file.content });
            continue;
          }

          const resource = await getVisibleResource(runtimeContext.db, file.path, runtimeContext);
          if (!resource) return { error: `Context file not found: ${file.path}` };
          files.push({ path: resource.path, content: resource.content });
        }
        if (files.length) packet.files = files;

        return Object.keys(packet).length ? packet : null;
      }

      function renderXmlElement(name, content = "", attrs = {}) {
        const attrText = Object.entries(attrs)
          .filter(([, value]) => value != null && value !== "")
          .map(([key, value]) => ` ${key}="${escapeXml(value)}"`)
          .join("");
        return `<${name}${attrText}>${escapeXml(content)}</${name}>`;
      }

      function renderPromptPacketXml(taskContext = null) {
        if (!taskContext) return "";

        const parts = [];
        if (taskContext.summary) parts.push(renderXmlElement("summary", taskContext.summary));
        if (taskContext.messages?.length) {
          parts.push(
            [
              "<messages>",
              ...taskContext.messages.map(
                (message) =>
                  `  ${renderXmlElement("message", message.text, { role: message.role })}`
              ),
              "</messages>",
            ].join("\n")
          );
        }
        if (taskContext.files?.length) {
          parts.push(
            [
              "<files>",
              ...taskContext.files.map(
                (file) => `  ${renderXmlElement("file", file.content, { path: file.path })}`
              ),
              "</files>",
            ].join("\n")
          );
        }

        if (!parts.length) return "";
        return ["<context>", parts.join("\n\n"), "</context>"].join("\n");
      }

      function parsePromptPacketXml(xml = "") {
        const source = String(xml).trim();
        if (!source) return null;

        const doc = new DOMParser().parseFromString(source, "application/xml");
        if (doc.querySelector("parsererror")) return null;

        const root =
          doc.documentElement?.tagName === "context"
            ? doc.documentElement
            : doc.querySelector("context");
        if (!root) return null;

        const packet = {};
        for (const child of Array.from(root.children)) {
          if (child.tagName === "summary" && child.textContent) {
            packet.summary = child.textContent;
          }
          if (child.tagName === "messages") {
            const messages = Array.from(child.children)
              .filter((node) => node.tagName === "message")
              .map((node) => ({
                role: node.getAttribute("role") || "user",
                text: node.textContent || "",
              }))
              .filter((message) => message.text);
            if (messages.length) packet.messages = messages;
          }
          if (child.tagName === "files") {
            const files = Array.from(child.children)
              .filter((node) => node.tagName === "file")
              .map((node) => ({
                path: node.getAttribute("path") || "",
                content: node.textContent || "",
              }))
              .filter((file) => file.path);
            if (files.length) packet.files = files;
          }
        }

        return Object.keys(packet).length ? packet : null;
      }

      function buildTaskPrompt(prompt, taskContext = null) {
        const contextXml = renderPromptPacketXml(taskContext);
        return [prompt, contextXml].filter(Boolean).join("\n\n");
      }

      async function task({ prompt, agent, context: taskContext, maxTurns }, context = {}) {
        const { db, threadId, agentId } = context;
        if (!db) return { error: "Database not available" };
        if (!agent) return { error: 'Missing target agent. Use "agent".' };
        if (!prompt) return { error: 'Missing prompt. Use "prompt".' };

        const currentAgent = agentId ? await db.get("agents", agentId) : null;
        if (currentAgent && !currentAgent.allowDelegation) {
          return { error: `${currentAgent.name || "This agent"} cannot delegate tasks.` };
        }

        const parentThread = threadId ? await db.get("threads", threadId) : null;
        const parentDepth = getThreadDepth(parentThread);
        const maxDepth = currentAgent?.maxDelegationDepth ?? 0;
        if (threadId && parentDepth >= maxDepth) {
          return {
            error: `Delegation depth limit reached for ${currentAgent?.name || "this agent"}.`,
          };
        }

        const targetAgent = await findAgentRecord(db, agent);
        if (!targetAgent) return { error: `Unknown agent: ${agent}` };
        if (
          await wouldCreateDelegationCycle(
            db,
            threadId,
            currentAgent?.id ?? agentId,
            targetAgent.id
          )
        ) {
          return { error: `Delegation cycle blocked for ${targetAgent.name || targetAgent.slug}.` };
        }

        const normalizedContext = normalizeTaskContextPacket(taskContext);
        const expandedContext = await expandTaskContextPacket(normalizedContext, context);
        if (expandedContext?.error) return expandedContext;

        return runDelegatedTask({
          context,
          prompt,
          taskContext: expandedContext,
          targetAgent,
          parentThread,
          parentDepth,
          turnLimit: getTaskTurnLimit(maxTurns),
        });
      }

      async function runDelegatedTask({
        context,
        prompt,
        taskContext,
        targetAgent,
        parentThread,
        parentDepth,
        turnLimit,
      }) {
        const { db, threadId, modelId, toolUseId } = context;
        const agentSlug = getAgentSlug(targetAgent);
        const nextDepth = parentDepth + 1;
        const effectiveModelId = modelId || targetAgent.defaultModelId || DEFAULT_MODEL_ID;
        const userPrompt = buildTaskPrompt(prompt, taskContext);
        const subTools = getToolsByNames(
          (targetAgent.tools || []).filter((name) => name !== "task")
        );
        const toolHandlers = getToolHandlers(subTools);
        const client = await getClientForModel(effectiveModelId);
        const messages = [{ role: "user", content: [{ text: userPrompt }] }];
        const subagentThreadId = await db.add("threads", {
          agentId: targetAgent.id,
          parentThreadId: threadId,
          rootThreadId: parentThread?.rootThreadId || threadId || null,
          parentToolUseId: toolUseId || null,
          depth: nextDepth,
          visibility: "subagent",
          subagentSlug: agentSlug,
          subagentAgentId: targetAgent.id,
          name: `${targetAgent.name} task`,
          status: "running",
          budgetTurns: turnLimit,
          createdAt: Date.now(),
        });
        const subContext = {
          db,
          threadId: subagentThreadId,
          parentThreadId: threadId,
          agentId: targetAgent.id,
        };

        // Keep the delegated run UI state in one place so the main loop reads linearly.
        const updateSubagentState = (change) => {
          if (!toolUseId) return;
          setRunningSubagents((prev) => {
            const next = new Map(prev);
            const current = next.get(toolUseId);
            const updated = change(current);
            if (updated) next.set(toolUseId, updated);
            return next;
          });
        };

        const saveSubagentMessage = async (message) => {
          if (!subagentThreadId) return;
          await db.add("messages", {
            ...message,
            threadId: subagentThreadId,
            agentId: targetAgent.id,
            createdAt: message.createdAt || Date.now(),
          });
        };

        const appendSubagentMessage = async (message, { clearCurrent = false } = {}) => {
          messages.push(message);
          await saveSubagentMessage(message);
          updateSubagentState((current) =>
            current
              ? {
                  ...current,
                  messages: [...current.messages, structuredClone(message)],
                  ...(clearCurrent ? { currentMessage: null } : {}),
                }
              : current
          );
        };

        const completeSubagentThread = async () => {
          if (!subagentThreadId) return;
          const thread = await db.get("threads", subagentThreadId);
          if (thread) {
            await db.put("threads", { ...thread, status: "completed", updatedAt: Date.now() });
          }
          updateSubagentState((current) =>
            current ? { ...current, status: "completed" } : current
          );
        };

        // 1. Create the delegated tracker and seed the child thread.
        if (toolUseId) {
          updateSubagentState(() => ({
            threadId: subagentThreadId,
            messages: [],
            currentMessage: null,
            status: "running",
            agent: targetAgent.name || targetAgent.slug,
            agentSlug,
          }));
        }

        await saveSubagentMessage(messages[0]);

        // 2. Run the delegated agent until it finishes or exhausts its turn budget.
        for (let turn = 0; turn < turnLimit; turn++) {
          const { assistantMsg, toolResults } = await runStreamingTurn({
            client,
            input: getConverseCommand({
              modelId: effectiveModelId,
              systemPrompt: targetAgent.systemPrompt,
              tools: subTools,
              messages: messages.map(({ role, content }) => ({ role, content })),
              reasoningMode: false,
            }),
            toolHandlers,
            toolContext: subContext,
            onChunk: (_, assistantMessage) =>
              updateSubagentState((current) =>
                current
                  ? { ...current, currentMessage: structuredClone(assistantMessage) }
                  : current
              ),
          });

          await appendSubagentMessage(assistantMsg, { clearCurrent: true });

          if (!toolResults) break;

          await appendSubagentMessage(toolResults);
        }

        // 3. Mark the delegated thread complete and return a compact summary to the parent.
        await completeSubagentThread();

        const lastAssistant = messages.filter((message) => message.role === "assistant").pop();
        return {
          agent: targetAgent.name || targetAgent.slug,
          agentSlug,
          depth: nextDepth,
          summary: lastAssistant?.content?.find((block) => block.text)?.text || "Completed",
          context: taskContext || null,
          maxTurns: turnLimit,
          turns: messages.filter((message) => message.role === "assistant").length,
          subagentThreadId,
        };
      }

      async function getToolResults(toolUseContent, tools, context = {}) {
        const content = await Promise.all(
          toolUseContent
            .filter((c) => c.toolUse)
            .map(async ({ toolUse }) => {
              const { toolUseId, name, input } = toolUse;
              try {
                // Pass toolUseId in context for task tool to use
                const result = await tools?.[name]?.(input, { ...context, toolUseId });
                return { toolResult: { toolUseId, content: [{ json: { result } }] } };
              } catch (error) {
                console.error("Tool error:", error);
                return {
                  toolResult: {
                    toolUseId,
                    content: [{ json: { result: error.stack || error.message || String(error) } }],
                  },
                };
              }
            })
        );
        return { role: "user", content };
      }

      async function getMessageContent(text, files) {
        const blocks = await Promise.all(files.map(getContentBlock));
        return [{ text }, ...blocks.filter(Boolean)];
      }

      async function getContentBlock(file) {
        const DOC_TYPES = ["pdf", "csv", "doc", "docx", "xls", "xlsx", "html", "txt", "md"];
        const IMG_TYPES = ["png", "jpg", "jpeg", "gif", "webp"];

        let ext = file.name.split(".").pop().toLowerCase();
        const isText = file.type.startsWith("text/") || /json|xml/.test(file.type);

        if (isText && !DOC_TYPES.includes(ext)) ext = "txt";
        if (ext === "htm") ext = "html";
        if (ext === "jpeg") ext = "jpg";

        const type = IMG_TYPES.includes(ext)
          ? "image"
          : DOC_TYPES.includes(ext)
            ? "document"
            : null;
        if (!type) return null;

        const bytes = new Uint8Array(await file.arrayBuffer());
        const name = file.name
          .replace(/[^A-Z0-9 _\-\(\)\[\]]/gi, "_")
          .replace(/\s+/g, " ")
          .trim();
        return { [type]: { format: ext, name, source: { bytes } } };
      }

      // #endregion

      // #region 17. UTILITIES
      // =============================================================================
      // Incremental JSON parser and generic tree/file helpers.
      // =============================================================================

      /**
       * Parses a JSON string incrementally, returning partial results for incomplete inputs.
       * Essential for streaming responses where JSON arrives in chunks.
       */
      function parseJSON(input) {
        if (typeof input !== "string") return input;
        const jsonString = input.trim();
        if (jsonString === "") return null;

        let index = 0;
        const LITERALS = {
          true: true,
          false: false,
          null: null,
          NaN: NaN,
          Infinity: Infinity,
          "-Infinity": -Infinity,
        };

        function skipWhitespace() {
          while (index < jsonString.length && " \n\r\t".includes(jsonString[index])) index++;
        }

        function parseValue() {
          skipWhitespace();
          if (index >= jsonString.length) throw new Error("Unexpected end of input");

          const char = jsonString[index];
          if (char === "{") return parseObject();
          if (char === "[") return parseArray();
          if (char === '"') return parseString();

          const remainingText = jsonString.substring(index);
          for (const [key, value] of Object.entries(LITERALS)) {
            if (jsonString.startsWith(key, index)) {
              const endPos = index + key.length;
              if (endPos === jsonString.length || ",]} \n\r\t".includes(jsonString[endPos])) {
                index = endPos;
                return value;
              }
            }
            if (key.startsWith(remainingText)) {
              index = jsonString.length;
              return value;
            }
          }

          if (char === "-" || (char >= "0" && char <= "9")) return parseNumber();
          throw new Error(`Unexpected token '${char}' at position ${index}`);
        }

        function parseArray() {
          index++;
          const arr = [];
          while (index < jsonString.length && jsonString[index] !== "]") {
            try {
              arr.push(parseValue());
              skipWhitespace();
              if (jsonString[index] === ",") index++;
              else if (jsonString[index] !== "]") break;
            } catch (e) {
              return arr;
            }
          }
          if (index < jsonString.length && jsonString[index] === "]") index++;
          return arr;
        }

        function parseObject() {
          index++;
          const obj = {};
          while (index < jsonString.length && jsonString[index] !== "}") {
            try {
              skipWhitespace();
              if (jsonString[index] !== '"') break;
              const key = parseString();
              skipWhitespace();
              if (index >= jsonString.length || jsonString[index] !== ":") break;
              index++;
              obj[key] = parseValue();
              skipWhitespace();
              if (jsonString[index] === ",") index++;
              else if (jsonString[index] !== "}") break;
            } catch (e) {
              return obj;
            }
          }
          if (index < jsonString.length && jsonString[index] === "}") index++;
          return obj;
        }

        function parseString() {
          if (jsonString[index] !== '"') throw new Error("Expected '\"' to start a string");
          const startIndex = index;
          index++;
          let escape = false;
          while (index < jsonString.length) {
            if (jsonString[index] === '"' && !escape) {
              const fullString = jsonString.substring(startIndex, ++index);
              return JSON.parse(fullString);
            }
            escape = jsonString[index] === "\\" ? !escape : false;
            index++;
          }
          const partialStr = jsonString.substring(startIndex);
          try {
            return JSON.parse(partialStr + '"');
          } catch (e) {
            const lastBackslash = partialStr.lastIndexOf("\\");
            if (lastBackslash > 0) return JSON.parse(partialStr.substring(0, lastBackslash) + '"');
            return partialStr.substring(1);
          }
        }

        function parseNumber() {
          const startIndex = index;
          const numberChars = "0123456789eE.+-";
          while (index < jsonString.length && numberChars.includes(jsonString[index])) index++;
          const numStr = jsonString.substring(startIndex, index);
          if (!numStr) throw new Error("Empty number literal");
          try {
            return parseFloat(numStr);
          } catch (e) {
            if (numStr.length > 1) return parseFloat(numStr.slice(0, -1));
            throw e;
          }
        }

        return parseValue();
      }

      // Tree/Branching utilities

      export function buildMessageTree(messages) {
        const nodes = new Map();
        const rootIds = [];

        for (const msg of messages) {
          nodes.set(msg.id, { message: msg, childIds: [] });
        }

        for (const msg of messages) {
          if (msg.parentId === null || msg.parentId === undefined) {
            rootIds.push(msg.id);
          } else if (nodes.has(msg.parentId)) {
            nodes.get(msg.parentId).childIds.push(msg.id);
          }
        }

        for (const [_, node] of nodes) {
          node.childIds.sort(
            (a, b) => nodes.get(a).message.createdAt - nodes.get(b).message.createdAt
          );
        }
        rootIds.sort((a, b) => nodes.get(a).message.createdAt - nodes.get(b).message.createdAt);

        return { rootIds, nodes };
      }

      export function getMostRecentPath(tree) {
        if (tree.rootIds.length === 0) return [];
        const path = [];
        let currentId = tree.rootIds[tree.rootIds.length - 1];

        while (currentId !== undefined) {
          path.push(currentId);
          const node = tree.nodes.get(currentId);
          if (!node || node.childIds.length === 0) break;
          currentId = node.childIds[node.childIds.length - 1];
        }
        return path;
      }

      export function getSiblings(tree, messageId) {
        const node = tree.nodes.get(messageId);
        if (!node) return [messageId];
        const parentId = node.message.parentId;
        if (parentId === null || parentId === undefined) return tree.rootIds;
        const parentNode = tree.nodes.get(parentId);
        return parentNode ? parentNode.childIds : [messageId];
      }

      export function getPathToMessage(tree, messageId) {
        const path = [];
        let currentId = messageId;
        while (currentId !== null && currentId !== undefined) {
          path.unshift(currentId);
          const node = tree.nodes.get(currentId);
          if (!node) break;
          currentId = node.message.parentId;
        }
        return path;
      }

      export function extendPath(tree, path) {
        if (path.length === 0) return [];
        const extended = [...path];
        let currentId = extended[extended.length - 1];

        while (true) {
          const node = tree.nodes.get(currentId);
          if (!node || node.childIds.length === 0) break;
          currentId = node.childIds[node.childIds.length - 1];
          extended.push(currentId);
        }
        return extended;
      }

      /** @returns {BranchState} */
      function buildActivePathState(messageTree, path = []) {
        const activePath = extendPath(messageTree, path);
        const activeLeafId = activePath.length > 0 ? activePath[activePath.length - 1] : null;
        const messages = activePath.map((id) => messageTree.nodes.get(id)?.message).filter(Boolean);

        return { activePath, activeLeafId, messages };
      }

      function buildThreadState(messages, thread, fallbackThreadId = null) {
        const messageTree = buildMessageTree(messages);
        const branchState = buildActivePathState(messageTree, getMostRecentPath(messageTree));

        return {
          thread: {
            id: thread?.id || fallbackThreadId,
            name: thread?.name || "Untitled",
            summaryMessageId: thread?.summaryMessageId || null,
          },
          messageTree,
          ...branchState,
        };
      }

          // Test branching: create tree with branches, verify navigation
          const messages = [
            { id: 1, parentId: null, createdAt: 1000, role: "user", content: [] },

            { id: 4, parentId: 3, createdAt: 4000, role: "user", content: [] },
          ];
          const tree = buildMessageTree(messages);

          assert(eq(tree.rootIds, [1]), "rootIds should be [1]");
          assert(eq(tree.nodes.get(1).childIds, [2, 3]), "children sorted by createdAt");
          assert(eq(getMostRecentPath(tree), [1, 3, 4]), "most recent path follows newest branch");
          assert(eq(getSiblings(tree, 2), [2, 3]), "siblings include both branches");
          assert(eq(getPathToMessage(tree, 4), [1, 3, 4]), "path from root to message");
          assert(eq(extendPath(tree, [1]), [1, 3, 4]), "extend path to leaf");
          const branchState = buildActivePathState(tree, [1]);

            eq(branchState.activePath, [1, 3, 4]),

          );
          assert(

            ),

          );
          assert(
            threadState.thread.name === "Branching",

          );

          const empty = buildMessageTree([]);
          assert(eq(empty.rootIds, []), "empty tree has no roots");

          assert(parseJSON('{"name": "test", "val').name === "test", "partial object");
          assert(eq(parseJSON("[1, 2, 3"), [1, 2, 3]), "partial array");
          assert(eq(parseJSON("true"), true), "literal true");
          assert(eq(parseJSON("null"), null), "literal null");

        async function testProxyFetchRoutesRemoteRequests() {
          const originalFetch = globalThis.fetch;
          const calls = [];
          setProxyConfig({
            endpoint: "https://proxy.example.com/base/",
            headerName: "X-Proxy-Key",
            headerValue: "secret",
          });

          globalThis.fetch = async (url, options = {}) => {
            calls.push({ url: String(url), options });
            return { ok: true, text: async () => "", headers: new Headers(), status: 200 };
          };

          try {
            await proxyFetch("https://api.example.com/data", {
              headers: { Accept: "application/json" },
            });

          );

          );

          );
        }

                return structuredClone(agents.get(+id));
              }
              if (table === "threads") return null;

            },
            getAllFromIndex: async () => [],

        async function testMcpCommandMethods() {
          const originalFetch = globalThis.fetch;
          const originalAgent = await db.get("agents", 1);
          const calls = [];
          mcpSessions.clear();
          await db.put("agents", {
            ...originalAgent,
            mcpServers: [{ name: "Docs", url: "https://mcp.example.com", enabled: true }],
          });

          globalThis.fetch = async (url, options = {}) => {
            const body = JSON.parse(options.body);
            calls.push(body.method);
            const headers = new Headers({ "Mcp-Session-Id": "session-1" });
            const ok = (payload) => ({
              ok: true,
              status: 200,
              headers,
              text: async () => JSON.stringify({ result: payload }),
            });
            if (body.method === "initialize") return ok({});
            if (body.method === "notifications/initialized")
              return { ok: true, status: 204, headers, text: async () => "" };
            if (body.method === "tools/list") return ok({ tools: [{ name: "search" }] });
            if (body.method === "tools/call") return ok({ content: [{ text: '{"ok":true}' }] });
            if (body.method === "resources/list") return ok({ resources: [{ name: "Docs" }] });
            if (body.method === "resources/read")
              return ok({ contents: [{ text: '{"ok":true}' }] });
            if (body.method === "prompts/list") return ok({ prompts: [{ name: "draft" }] });
            if (body.method === "prompts/get")
              return ok({ messages: [{ role: "user", content: { text: "hello" } }] });
            return ok({});
          };

          try {
            const tools = await mcp(
              { command: "list_tools", server: "Docs" },
              { db, agentId: 1, threadId: null }
            );
            const call = await mcp(
              { command: "call_tool", server: "Docs", tool: "search", args: { q: "hi" } },
              { db, agentId: 1, threadId: null }
            );
            const resources = await mcp(
              { command: "list_resources", server: "Docs" },
              { db, agentId: 1, threadId: null }
            );
            const read = await mcp(
              { command: "read_resource", server: "Docs", uri: "docs://1" },
              { db, agentId: 1, threadId: null }
            );
            const prompts = await mcp(
              { command: "list_prompts", server: "Docs" },
              { db, agentId: 1, threadId: null }
            );
            const prompt = await mcp(
              { command: "get_prompt", server: "Docs", name: "draft" },
              { db, agentId: 1, threadId: null }
            );

            assert(tools.tools[0].name === "search", "MCP should list tools");
            assert(call.content[0].text.includes("ok"), "MCP should call tools");
            assert(resources.resources[0].name === "Docs", "MCP should list resources");
            assert(read.contents[0].text.includes("ok"), "MCP should read resources");
            assert(prompts.prompts[0].name === "draft", "MCP should list prompts");
            assert(prompt.messages[0].content.text === "hello", "MCP should fetch prompts");
            assert(
              calls.includes("tools/list") && calls.includes("prompts/get"),
              "MCP should execute the requested commands"
            );
          } finally {
            globalThis.fetch = originalFetch;
            await db.put("agents", originalAgent);
            mcpSessions.clear();
          }
        }

        async function testSummarizeBranchIfNeeded() {
          const modelId = "us.anthropic.claude-haiku-4-5-20251001-v1:0";
          const originalMax = MODEL_MAX_CONTEXT[modelId];
          MODEL_MAX_CONTEXT[modelId] = 50;

          const threadId = await db.add("threads", {
            agentId: 1,
            name: "Summary Test Thread",
            summaryMessageId: null,
          });
          const userMessage = {
            role: "user",
            content: [{ text: "A".repeat(400) }],
            parentId: null,
            createdAt: Date.now(),
            agentId: 1,
            threadId,
          };
          const userMessageId = await db.add("messages", userMessage);
          userMessage.id = userMessageId;

          const [store, setStore] = createStore({
            modelId,
            systemPrompt: "You are concise.",
            tools: [],
            reasoningMode: false,
            thread: { id: threadId, name: "Summary Test Thread", summaryMessageId: null },
            messages: [userMessage],
            activeLeafId: userMessageId,
          });

          let summaryInput = null;
          const summaryText =
            `${CONVERSATION_SUMMARY_TOKEN}\n\n` +
            "Structured notes.\n\n## Latest User Message\n> " +
            "A".repeat(400) +
            "\n\nContinue addressing this message in your next response.";
          const client = {
            async send(input) {
              summaryInput = input;
              return {
                stream: (async function* () {
                  yield { contentBlockStart: { contentBlockIndex: 0, start: {} } };
                  yield {
                    contentBlockDelta: { contentBlockIndex: 0, delta: { text: summaryText } },
                  };
                  yield { contentBlockStop: { contentBlockIndex: 0 } };
                  yield { messageStop: { stopReason: "end_turn" } };
                })(),
              };
            },
          };

          try {
            const nextParentId = await summarizeBranchIfNeeded(
              store,
              setStore,
              client,
              userMessageId,
              { agentId: 1, threadId },
              db
            );

            assert(summaryInput, "Summary request should be sent");
            assert(
              summaryInput.messages.at(-1).content[0].text.includes("Latest User Message"),
              "Summary prompt should include latest user section"
            );
            assert(
              summaryInput.messages.at(-1).content[0].text.includes("A".repeat(400)),
              "Summary prompt should include triggering user text verbatim"
            );
            assert(nextParentId !== userMessageId, "Summary message should become next parent");
            assert(
              store.thread.summaryMessageId === nextParentId,
              "Store thread should track summary message ID"
            );
            assert(
              store.messages.at(-1).id === nextParentId,
              "Summary message should be appended to visible path"
            );
            assert(
              isConversationSummaryMessage(store.messages.at(-1)),
              "Appended message should be a summary"
            );

            const thread = await db.get("threads", threadId);
            assert(
              thread.summaryMessageId === nextParentId,
              "Thread record should store summary message ID"
            );

            const compressed = getCompressedMessages(store.messages, thread.summaryMessageId);
            assert(compressed.length === 1, "Compressed context should start from summary");
            assert(
              compressed[0].id === nextParentId,
              "Compressed context should begin with saved summary"
            );
          } finally {
            MODEL_MAX_CONTEXT[modelId] = originalMax;
            const messages = await db.getAllFromIndex("messages", "threadId", threadId);
            for (const message of messages) await db.delete("messages", message.id);
            await db.delete("threads", threadId);
          }
        }

        async function testEditorResultDownload() {
          const container = document.createElement("div");
          document.body.appendChild(container);
          const originalCreateObjectURL = URL.createObjectURL;
          const originalRevokeObjectURL = URL.revokeObjectURL;
          const originalCreateElement = document.createElement.bind(document);
          let clicked = false;
          let createdUrl = null;

          URL.createObjectURL = () => (createdUrl = "blob:test");
          URL.revokeObjectURL = (_) => {};
          document.createElement = (tag) => {

                clicked = true;
              };

          };

          try {

                html`<${EditorResult} result=${() => ({ path: "notes.txt", content: "hello" })} />`,

          } finally {
            URL.createObjectURL = originalCreateObjectURL;
            URL.revokeObjectURL = originalRevokeObjectURL;
            document.createElement = originalCreateElement;
            container.remove();
          }
        }

        async function testGeminiFunctionCallThoughtSignatureRoundTrip() {
          const requests = [];
          let callCount = 0;
          const client = getGeminiClient({
            models: {
              async generateContentStream(input) {
                requests.push(structuredClone(input));
                callCount++;
                if (callCount === 1) {
                  return (async function* () {
                    yield {
                      candidates: [
                        {
                          content: {
                            parts: [
                              {
                                functionCall: {
                                  name: "editor",
                                  args: { command: "view", path: "/" },
                                  id: "tool-42",
                                },
                                thoughtSignature: "sig-tool",
                              },
                            ],
                          },
                          finishReason: "STOP",
                        },
                      ],
                    };
                  })();
                }
                return (async function* () {
                  yield {
                    candidates: [{ content: { parts: [{ text: "done" }] }, finishReason: "STOP" }],
                  };
                })();
              },
            },
          });

          const firstTurn = await runStreamingTurn({
            client,
            input: {
              modelId: GEMINI_FLASH_LITE_MODEL_ID,
              messages: [{ role: "user", content: [{ text: "hello" }] }],
              toolConfig: { tools: [] },
            },
          });
          assert(
            firstTurn.assistantMsg.content[0].reasoningContent?.reasoningText?.signature ===
              "sig-tool",
            "Gemini tool call signatures should map into Bedrock reasoning signatures"
          );
          assert(
            firstTurn.assistantMsg.content[1].toolUse?.toolUseId === "tool-42",
            "Gemini tool calls should still map to Bedrock tool use blocks"
          );

          const secondOutput = await client.send({
            modelId: GEMINI_FLASH_LITE_MODEL_ID,
            messages: [
              { role: "user", content: [{ text: "hello" }] },
              firstTurn.assistantMsg,
              {
                role: "user",
                content: [
                  { toolResult: { toolUseId: "tool-42", content: [{ json: { ok: true } }] } },
                ],
              },
            ],
            toolConfig: { tools: [] },
          });
          await collectBlocks(secondOutput);

          assert(
            requests[1].contents[1].parts[0].functionCall.name === "editor",
            "Gemini round-trip should preserve the tool call part"
          );
          assert(
            requests[1].contents[1].parts[0].thoughtSignature === "sig-tool",
            "Gemini round-trip should reattach the reasoning signature to the function call"
          );
        }
